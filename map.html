<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pin Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #2563EB;
    --acc-hi:  #3B82F6;
    --ink:     #1E293B;
    --gray:    #64748B;
    --border:  rgba(0,0,0,0.08);
    --shadow:  rgba(30,41,59,0.10);
    --sw:      280px;
  }

  html, body {
    height: 100%;
    font-family: "Noto Sans JP", sans-serif;
    color: var(--ink);
  }

  /* ── layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── sidebar ── */
  #sidebar {
    width: var(--sw);
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    box-shadow: 2px 0 20px var(--shadow);
    z-index: 10;
  }

  .sb-head {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sb-logo {
    font-family: "Space Mono", monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .sb-tools {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tool-btn {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tool-btn:hover { color: var(--accent); border-color: rgba(37,99,235,0.3); }

  .sb-count {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.08em;
    margin-top: 10px;
  }

  .sb-hint {
    padding: 9px 18px 11px;
    font-size: 12px;
    color: var(--gray);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    letter-spacing: 0.02em;
    line-height: 1.6;
  }

  /* ── 住所検索 ── */
  .sb-search {
    padding: 10px 14px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search-row {
    display: flex;
    gap: 6px;
  }

  .search-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    min-width: 0;
    transition: border-color 0.15s, background 0.15s;
    background: #F8FAFC;
  }
  .search-input:focus { border-color: var(--accent); background: #fff; }
  .search-input::placeholder { color: var(--gray); opacity: 0.6; }

  .search-btn {
    width: 34px; height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }
  .search-btn:hover:not(:disabled) { background: var(--acc-hi); }
  .search-btn:disabled { opacity: 0.45; cursor: default; }

  .search-msg {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    margin-top: 5px;
    min-height: 13px;
    letter-spacing: 0.04em;
  }
  .search-msg.err  { color: #c05050; }
  .search-msg.info { color: var(--gray); }

  /* ── pin list ── */
  #pinList {
    flex: 1;
    overflow-y: auto;
  }
  #pinList::-webkit-scrollbar { width: 4px; }
  #pinList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #emptyMsg {
    padding: 52px 20px;
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    line-height: 2.4;
  }

  .pin-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    animation: pinIn 0.28s cubic-bezier(0.2,0,0,1) both;
  }
  .pin-item:hover { background: rgba(37,99,235,0.04); }
  .pin-item.active { background: rgba(37,99,235,0.09); }

  @keyframes pinIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .pin-num {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: "Space Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
  }

  .pin-info { flex: 1; min-width: 0; }

  .pin-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .pin-coords {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.01em;
  }

  .pin-del {
    width: 22px; height: 22px;
    background: none;
    border: none;
    color: transparent;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .pin-item:hover .pin-del { color: var(--gray); }
  .pin-del:hover { color: #d05050 !important; background: rgba(200,50,50,0.07); }

  .pin-edit-btn {
    width: 22px; height: 22px;
    background: none;
    border: none;
    color: transparent;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .pin-item:hover .pin-edit-btn { color: var(--gray); }
  .pin-edit-btn:hover { color: var(--accent) !important; background: rgba(37,99,235,0.07); }
  .pin-edit-btn.has-info { color: var(--accent) !important; opacity: 0.65; }
  .pin-item:hover .pin-edit-btn.has-info { opacity: 1; }

  .pin-drag {
    cursor: grab;
    color: var(--gray);
    font-size: 14px;
    padding: 0 4px 0 2px;
    flex-shrink: 0;
    user-select: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .pin-item:hover .pin-drag { opacity: 1; }
  .pin-drag:active { cursor: grabbing; }
  .pin-item.dragging { opacity: 0.35; }
  .pin-item.drag-over-top { border-top: 2px solid var(--accent); }
  .pin-item.drag-over-bot { border-bottom: 2px solid var(--accent); }

  /* ── info modal ── */
  .info-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,41,59,0.45);
    backdrop-filter: blur(3px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .info-overlay.open { opacity: 1; pointer-events: all; }

  .info-modal {
    background: #fff;
    border-radius: 8px;
    width: min(480px, 94vw);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.16);
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .info-overlay.open .info-modal { transform: translateY(0); }

  .info-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }

  .info-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-close {
    width: 28px; height: 28px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--gray);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  .info-close:hover { color: var(--ink); border-color: var(--ink); }

  .info-body {
    overflow-y: auto;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .info-body::-webkit-scrollbar { width: 4px; }
  .info-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .info-section { display: flex; flex-direction: column; gap: 8px; }

  .info-section-label {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .info-sub-section {
    padding-left: 14px;
    border-left: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .info-sub { display: flex; flex-direction: column; gap: 4px; }

  .info-sub-label {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.08em;
  }

  .info-field {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    background: #F8FAFC;
    transition: border-color 0.15s, background 0.15s;
  }
  .info-field:focus { border-color: var(--accent); background: #fff; }
  .info-field::placeholder { color: var(--gray); opacity: 0.5; }
  textarea.info-field { resize: vertical; min-height: 72px; line-height: 1.6; }

  .info-foot {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .info-save-btn {
    padding: 9px 32px;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .info-save-btn:hover { background: var(--acc-hi); }

  .info-total {
    font-weight: 700;
    color: var(--accent);
    border-color: var(--accent) !important;
  }
  .info-total[readonly] {
    cursor: default;
    opacity: 0.85;
  }

  /* ── map ── */
  #map { flex: 1; min-width: 0; }

  /* ── custom marker ── */
  .m-pin {
    width: 30px; height: 30px;
    background: var(--accent);
    border: 2.5px solid #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: "Space Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.30);
    cursor: pointer;
  }

  /* ── add-pin popup ── */
  .add-popup .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.14);
    border: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
  }
  .add-popup .leaflet-popup-content { margin: 0; width: auto !important; }
  .add-popup .leaflet-popup-tip-container { display: none; }
  .add-popup .leaflet-popup-close-button { color: var(--gray) !important; font-size: 16px !important; top: 8px !important; right: 10px !important; }

  .popup-form {
    padding: 12px;
    display: flex;
    gap: 7px;
    min-width: 250px;
  }

  .popup-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    min-width: 0;
    transition: border-color 0.15s;
  }
  .popup-input:focus { border-color: var(--accent); }
  .popup-input::placeholder { color: var(--gray); opacity: 0.7; }

  .popup-btn {
    padding: 7px 14px;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .popup-btn:hover { background: var(--acc-hi); }

  /* Leaflet tooltip */
  .pin-tip {
    background: var(--ink) !important;
    color: #fff !important;
    border: none !important;
    border-radius: 4px !important;
    font-family: "Noto Sans JP", sans-serif !important;
    font-size: 12px !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
    padding: 4px 9px !important;
  }
  .pin-tip::before { display: none !important; }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: calc(var(--sw) + (100vw - var(--sw)) / 2);
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── mobile ── */
  @media (max-width: 640px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; height: 44vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map { flex: 1; min-height: 0; }
    #toast { left: 50%; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">PIN MAP</div>
      <div class="sb-tools">
        <button class="tool-btn" id="btnHome">日本に戻る</button>
        <button class="tool-btn" id="btnExport">Export</button>
        <label  class="tool-btn" for="importInput">Import</label>
        <input type="file" id="importInput" accept=".json" style="display:none">
        <button class="tool-btn" id="btnClear">全削除</button>
      </div>
      <div class="sb-count" id="pinCount">0 ピン</div>
    </div>
    <div class="sb-hint">地図をクリックするとピンを追加できます</div>

    <div class="sb-search">
      <form id="searchForm" autocomplete="off">
        <div class="search-row">
          <input type="text" id="searchInput" class="search-input" placeholder="住所・場所名で検索">
          <button type="submit" class="search-btn" id="searchBtn" aria-label="検索">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
        <div class="search-msg" id="searchMsg"></div>
      </form>
    </div>

    <div id="pinList">
      <p id="emptyMsg">まだピンがありません</p>
    </div>
  </div>

  <div id="map"></div>
</div>
<div id="toast"></div>

<!-- 情報入力モーダル -->
<div class="info-overlay" id="infoOverlay">
  <div class="info-modal">
    <div class="info-head">
      <div class="info-title" id="infoTitle"></div>
      <button class="info-close" id="infoClose" aria-label="閉じる">✕</button>
    </div>
    <div class="info-body">

      <div class="info-section">
        <div class="info-section-label">🚃 電車</div>
        <div class="info-sub-section">
          <div class="info-sub">
            <div class="info-sub-label">💴 合計</div>
            <input type="text" class="info-field info-total" id="infoTrainTotal" placeholder="例：往復 3,200円">
          </div>
        </div>
        <textarea class="info-field" id="infoTrain" placeholder="路線・最寄り駅・乗り換えなど"></textarea>
      </div>

      <div class="info-section">
        <div class="info-section-label">🚗 車</div>
        <div class="info-sub-section">
          <div class="info-sub">
            <div class="info-sub-label">💴 合計</div>
            <input type="text" class="info-field info-total" id="infoCarTotal" placeholder="ガソリン・駐車場・高速から自動計算" readonly>
          </div>
          <div class="info-sub">
            <div class="info-sub-label">⛽ ガソリン</div>
            <input type="text" class="info-field" id="infoGas" placeholder="近くのスタンド・価格など">
          </div>
          <div class="info-sub">
            <div class="info-sub-label">🅿 駐車場</div>
            <input type="text" class="info-field" id="infoParking" placeholder="場所・料金・台数など">
          </div>
          <div class="info-sub">
            <div class="info-sub-label">🛣 高速</div>
            <input type="text" class="info-field" id="infoHighway" placeholder="最寄りIC・ルートなど">
          </div>
        </div>
      </div>

    </div>
    <div class="info-foot">
      <button class="info-save-btn" id="infoSave">保存</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── Map setup ──────────────────────────────────────────
  const JAPAN = { center: [36.5, 136.0], zoom: 6 };

  const map = L.map('map', {
    center: JAPAN.center,
    zoom:   JAPAN.zoom,
    zoomControl: false,
  });

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ── Data ───────────────────────────────────────────────
  const KEY = 'pinmap_v1';
  let pins = [];
  const markerMap = {};

  function load() {
    try {
      const r = JSON.parse(localStorage.getItem(KEY));
      if (Array.isArray(r)) pins = r;
    } catch (_) {}
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(pins));
  }

  // ── Marker icon ────────────────────────────────────────
  function makeIcon(num) {
    return L.divIcon({
      className: '',
      html: `<div class="m-pin">${num}</div>`,
      iconSize:   [30, 30],
      iconAnchor: [15, 30],
      popupAnchor:[0, -32],
    });
  }

  // ── Render ─────────────────────────────────────────────
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function render() {
    const list  = document.getElementById('pinList');
    const count = document.getElementById('pinCount');
    const ids   = new Set(pins.map(p => p.id));

    // remove stale markers
    Object.keys(markerMap).forEach(id => {
      if (!ids.has(id)) { markerMap[id].remove(); delete markerMap[id]; }
    });

    // add / update markers
    pins.forEach((pin, i) => {
      if (!markerMap[pin.id]) {
        const marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(i + 1) }).addTo(map);
        marker.bindTooltip(pin.name, { direction: 'top', className: 'pin-tip', offset: [0, -4] });
        marker.on('click', () => {
          map.flyTo([pin.lat, pin.lng], Math.max(map.getZoom(), 13), { duration: 0.7 });
          highlightPin(pin.id);
        });
        markerMap[pin.id] = marker;
      } else {
        markerMap[pin.id].setIcon(makeIcon(i + 1));
      }
    });

    // rebuild sidebar list
    list.innerHTML = '';
    count.textContent = `${pins.length} ピン`;

    if (!pins.length) {
      const msg = document.createElement('p');
      msg.id = 'emptyMsg';
      msg.textContent = 'まだピンがありません';
      list.appendChild(msg);
      return;
    }

    pins.forEach((pin, i) => {
      const item = document.createElement('div');
      item.className  = 'pin-item';
      item.dataset.id = pin.id;

      const num = document.createElement('div');
      num.className   = 'pin-num';
      num.textContent = i + 1;

      const info = document.createElement('div');
      info.className  = 'pin-info';
      info.innerHTML  = `<div class="pin-name">${esc(pin.name)}</div>`
                      + `<div class="pin-coords">${pin.lat.toFixed(4)}, ${pin.lng.toFixed(4)}</div>`;

      const handle = document.createElement('div');
      handle.className   = 'pin-drag';
      handle.textContent = '⠿';
      handle.setAttribute('title', 'ドラッグして並べ替え');

      const hasInfo = pin.info && Object.values(pin.info).some(v => v);

      const editBtn = document.createElement('button');
      editBtn.className = 'pin-edit-btn' + (hasInfo ? ' has-info' : '');
      editBtn.setAttribute('aria-label', '情報を編集');
      editBtn.textContent = '✎';
      editBtn.addEventListener('click', e => { e.stopPropagation(); openInfoModal(pin.id); });

      const del = document.createElement('button');
      del.className   = 'pin-del';
      del.setAttribute('aria-label', '削除');
      del.textContent = '✕';
      del.addEventListener('click', e => { e.stopPropagation(); deletePin(pin.id); });

      item.append(handle, num, info, editBtn, del);
      setupPinDrag(item, pin.id);
      item.addEventListener('click', () => {
        map.flyTo([pin.lat, pin.lng], Math.max(map.getZoom(), 13), { duration: 0.7 });
        highlightPin(pin.id);
      });
      list.appendChild(item);
    });
  }

  function highlightPin(id) {
    document.querySelectorAll('.pin-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === id)
    );
  }

  function deletePin(id) {
    pins = pins.filter(p => p.id !== id);
    save(); render();
  }

  // ── Drag & Drop reorder ────────────────────────────────
  let dragSrcId = null;

  function clearDragStyles() {
    document.querySelectorAll('.pin-item').forEach(el =>
      el.classList.remove('drag-over-top', 'drag-over-bot', 'dragging')
    );
  }

  function setupPinDrag(item, id) {
    item.setAttribute('draggable', 'true');

    item.addEventListener('dragstart', e => {
      dragSrcId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => item.classList.add('dragging'), 0);
    });

    item.addEventListener('dragend', () => {
      dragSrcId = null;
      clearDragStyles();
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcId === id) return;
      const rect = item.getBoundingClientRect();
      clearDragStyles();
      item.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bot');
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over-top', 'drag-over-bot');
    });

    item.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!dragSrcId || dragSrcId === id) return;

      const rect   = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      const fromIdx = pins.findIndex(p => p.id === dragSrcId);
      const [moved] = pins.splice(fromIdx, 1);
      const toIdx   = pins.findIndex(p => p.id === id);
      pins.splice(before ? toIdx : toIdx + 1, 0, moved);

      dragSrcId = null;
      save(); render();
    });
  }

  // ── Info modal ─────────────────────────────────────────
  let currentInfoId = null;

  function openInfoModal(id) {
    const pin = pins.find(p => p.id === id);
    if (!pin) return;
    currentInfoId = id;
    document.getElementById('infoTitle').textContent = pin.name;
    const info = pin.info || {};
    document.getElementById('infoTrainTotal').value = info.trainTotal || '';
    document.getElementById('infoTrain').value      = info.train      || '';
    document.getElementById('infoGas').value        = info.gas        || '';
    document.getElementById('infoParking').value    = info.parking    || '';
    document.getElementById('infoHighway').value    = info.highway    || '';
    calcCarTotal();
    document.getElementById('infoOverlay').classList.add('open');
    document.getElementById('infoTrainTotal').focus();
  }

  function parseYen(str) {
    const m = str.replace(/,/g, '').match(/\d+/);
    return m ? parseInt(m[0], 10) : 0;
  }

  function calcCarTotal() {
    const sum = parseYen(document.getElementById('infoGas').value)
              + parseYen(document.getElementById('infoParking').value)
              + parseYen(document.getElementById('infoHighway').value);
    document.getElementById('infoCarTotal').value =
      sum > 0 ? sum.toLocaleString('ja-JP') + ' 円' : '';
  }

  ['infoGas', 'infoParking', 'infoHighway'].forEach(id => {
    document.getElementById(id).addEventListener('input', calcCarTotal);
  });

  function closeInfoModal() {
    document.getElementById('infoOverlay').classList.remove('open');
    currentInfoId = null;
  }

  document.getElementById('infoSave').addEventListener('click', () => {
    if (!currentInfoId) return;
    const pin = pins.find(p => p.id === currentInfoId);
    if (!pin) return;
    pin.info = {
      trainTotal: document.getElementById('infoTrainTotal').value.trim(),
      train:      document.getElementById('infoTrain').value.trim(),
      gas:        document.getElementById('infoGas').value.trim(),
      parking:    document.getElementById('infoParking').value.trim(),
      highway:    document.getElementById('infoHighway').value.trim(),
    };
    save(); render();
    closeInfoModal();
  });

  document.getElementById('infoClose').addEventListener('click', closeInfoModal);

  document.getElementById('infoOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('infoOverlay')) closeInfoModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeInfoModal();
  });

  // ── Add pin on click ───────────────────────────────────
  let activePopup = null;

  map.on('click', function(e) {
    const { lat, lng } = e.latlng;

    const form  = document.createElement('div');
    form.className = 'popup-form';

    const input = document.createElement('input');
    input.type      = 'text';
    input.className = 'popup-input';
    input.placeholder = '場所の名前（省略可）';
    input.maxLength   = 30;

    const btn = document.createElement('button');
    btn.className   = 'popup-btn';
    btn.textContent = '追加';

    form.append(input, btn);

    const doAdd = () => {
      const name = input.value.trim() || `ピン ${pins.length + 1}`;
      const id   = Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      pins.push({ id, lat, lng, name });
      save(); render();
      map.closePopup(activePopup);
      activePopup = null;
      setTimeout(() => {
        const el = document.querySelector(`.pin-item[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        highlightPin(id);
      }, 60);
    };

    btn.addEventListener('click', doAdd);
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  doAdd();
      if (ev.key === 'Escape') { map.closePopup(activePopup); activePopup = null; }
    });

    activePopup = L.popup({ className: 'add-popup', closeButton: true, maxWidth: 320 })
      .setLatLng(e.latlng)
      .setContent(form)
      .openOn(map);

    setTimeout(() => input.focus(), 80);
  });

  map.on('popupclose', () => { activePopup = null; });

  // ── Geocoding (Nominatim / OpenStreetMap) ─────────────
  document.getElementById('searchForm').addEventListener('submit', async e => {
    e.preventDefault();
    const query  = document.getElementById('searchInput').value.trim();
    const btn    = document.getElementById('searchBtn');
    const msgEl  = document.getElementById('searchMsg');
    if (!query) return;

    btn.disabled      = true;
    msgEl.className   = 'search-msg info';
    msgEl.textContent = '検索中…';

    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=jp`,
        { headers: { 'Accept-Language': 'ja,en' } }
      );
      const data = await res.json();

      if (!data.length) {
        msgEl.className   = 'search-msg err';
        msgEl.textContent = '見つかりませんでした';
        return;
      }

      msgEl.textContent = '';
      const lat    = parseFloat(data[0].lat);
      const lng    = parseFloat(data[0].lon);
      const latlng = L.latLng(lat, lng);
      document.getElementById('searchInput').value = '';

      // 地図が目的地に着いたらピン追加ポップアップを開く
      map.once('moveend', () => {
        const form = document.createElement('div');
        form.className = 'popup-form';

        const input = document.createElement('input');
        input.type      = 'text';
        input.className = 'popup-input';
        input.value     = query;
        input.maxLength = 30;

        const addBtn = document.createElement('button');
        addBtn.className   = 'popup-btn';
        addBtn.textContent = '追加';

        form.append(input, addBtn);

        const doAdd = () => {
          const name = input.value.trim() || query;
          const id   = Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
          pins.push({ id, lat, lng, name });
          save(); render();
          map.closePopup(activePopup);
          activePopup = null;
          setTimeout(() => {
            const el = document.querySelector(`.pin-item[data-id="${id}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            highlightPin(id);
          }, 60);
        };

        addBtn.addEventListener('click', doAdd);
        input.addEventListener('keydown', ev => {
          if (ev.key === 'Enter')  doAdd();
          if (ev.key === 'Escape') { map.closePopup(activePopup); activePopup = null; }
        });

        activePopup = L.popup({ className: 'add-popup', closeButton: true, maxWidth: 320 })
          .setLatLng(latlng)
          .setContent(form)
          .openOn(map);

        setTimeout(() => { input.focus(); input.select(); }, 80);
      });

      map.flyTo(latlng, 15, { duration: 1.2 });

    } catch (_) {
      msgEl.className   = 'search-msg err';
      msgEl.textContent = 'ネットワークエラー';
    } finally {
      btn.disabled = false;
    }
  });

  // ── Home button ────────────────────────────────────────
  document.getElementById('btnHome').addEventListener('click', () => {
    map.flyTo(JAPAN.center, JAPAN.zoom, { duration: 0.8 });
  });

  // ── Export ─────────────────────────────────────────────
  document.getElementById('btnExport').addEventListener('click', () => {
    if (!pins.length) { showToast('ピンがありません'); return; }
    const blob = new Blob([JSON.stringify(pins, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `pinmap_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('エクスポートしました');
  });

  // ── Import ─────────────────────────────────────────────
  document.getElementById('importInput').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try { data = JSON.parse(ev.target.result); }
      catch (_) { showToast('読み込み失敗：JSONではありません'); return; }
      if (!Array.isArray(data)) { showToast('読み込み失敗：正しい形式ではありません'); return; }
      const valid = data.filter(p =>
        p.id && typeof p.lat === 'number' && typeof p.lng === 'number' && p.name
      );
      if (!valid.length) { showToast('有効なピンデータがありませんでした'); return; }
      if (pins.length > 0) {
        if (!confirm(`現在の ${pins.length} 件を削除して ${valid.length} 件に置き換えますか？`)) return;
      }
      Object.values(markerMap).forEach(m => m.remove());
      Object.keys(markerMap).forEach(k => delete markerMap[k]);
      pins = valid;
      save(); render();
      map.fitBounds(L.latLngBounds(pins.map(p => [p.lat, p.lng])), { padding: [50, 50] });
      showToast(`${valid.length} 件をインポートしました`);
    };
    reader.readAsText(file);
  });

  // ── Clear all ──────────────────────────────────────────
  document.getElementById('btnClear').addEventListener('click', () => {
    if (!pins.length) { showToast('ピンがありません'); return; }
    if (!confirm(`${pins.length} 件のピンをすべて削除しますか？`)) return;
    Object.values(markerMap).forEach(m => m.remove());
    Object.keys(markerMap).forEach(k => delete markerMap[k]);
    pins = []; save(); render();
  });

  // ── Toast ──────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ── Init ───────────────────────────────────────────────
  load();
  render();
  if (pins.length) {
    map.fitBounds(L.latLngBounds(pins.map(p => [p.lat, p.lng])), { padding: [60, 60] });
  }
</script>
</body>
</html>
