<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aquarium — 泳ぐ魚大図鑑</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#dfeee9}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
  #g3{pointer-events:none}
  .hint{
    position:fixed;left:50%;bottom:9%;transform:translateX(-50%);
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
    font-size:17px;letter-spacing:.35em;color:rgba(255,255,255,.92);
    text-shadow:0 1px 14px rgba(120,140,160,.6);
    pointer-events:none;white-space:nowrap;
    transition:opacity 2s;
  }
  .hint.hide{opacity:0}
  .ui{
    position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:5;
  }
  .ui button{
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;font-size:13px;
    color:#4e6070;
    background:rgba(255,255,255,.62);border:1px solid rgba(110,135,155,.35);
    border-radius:99px;padding:8px 18px;cursor:pointer;
    backdrop-filter:blur(8px);
    box-shadow:0 2px 10px rgba(120,140,160,.18);
    transition:background .25s;
  }
  .ui button:hover{background:rgba(255,255,255,.85)}
  #wtoast{
    position:fixed;left:50%;bottom:16%;transform:translateX(-50%);
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;font-size:12.5px;
    color:#4e6070;background:rgba(255,255,255,.75);
    border:1px solid rgba(110,135,155,.3);border-radius:99px;
    padding:7px 16px;pointer-events:none;
    opacity:0;transition:opacity .5s;z-index:6;
  }
  #wtoast.show{opacity:1}
  #panel{
    position:fixed;top:62px;right:14px;z-index:5;
    display:none;flex-direction:column;gap:12px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(10px);
    border:1px solid rgba(110,135,155,.3);border-radius:16px;
    padding:16px 18px;
    box-shadow:0 4px 20px rgba(120,140,160,.2);
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;
  }
  #panel.show{display:flex}
  #panel .prow{display:flex;align-items:center;gap:10px}
  #panel .prow span{font-size:12.5px;color:#4e6070;width:80px;flex-shrink:0}
  #panel .prow input[type=range]{width:150px;accent-color:#8fa8c8}
  #panel .prow b{font-size:12px;color:#4e6070;min-width:52px;text-align:right;font-weight:600}
  #card{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(12px);
    width:min(430px,calc(100vw - 28px));z-index:6;
    background:rgba(255,255,255,.78);backdrop-filter:blur(12px);
    border:1px solid rgba(110,135,155,.3);border-radius:18px;
    padding:16px 18px;box-shadow:0 6px 24px rgba(80,110,140,.25);
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;color:#3d4f5e;
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
  }
  #card.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  #card .head{display:flex;align-items:center;gap:10px}
  #cardChip{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  #cardName{font-size:16px;font-weight:700}
  #cardSci{font-size:11.5px;font-style:italic;color:#7b8b98;margin-left:8px}
  #cardX{
    margin-left:auto;border:none;background:none;font-size:18px;color:#7b8b98;
    cursor:pointer;padding:2px 6px;border-radius:8px;
  }
  #cardX:hover{background:rgba(110,135,155,.12)}
  #cardDesc{font-size:13px;line-height:1.9;margin-top:8px}
  #err{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    font-family:"Segoe UI","Yu Gothic UI",sans-serif;color:#5a6b78;font-size:15px;
    text-align:center;line-height:2;
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="g3"></canvas>
<div class="hint" id="hint">水面をなでて、さかなにふれてみてください</div>
<div class="ui">
  <button id="bPhoto" title="お好きな写真を水面の下に沈めます">写真を変更</button>
  <button id="bCalm" title="波を静めます">静める</button>
  <button id="bAdj" title="波の強さなどを調整します">調整</button>
</div>
<div id="panel">
  <div class="prow"><span>波の強さ</span><input id="sPow" type="range" min="0" max="300" value="10"><b id="vPow">10%</b></div>
  <div class="prow"><span>広がる速さ</span><input id="sSpd" type="range" min="1" max="4" step="1" value="1"><b id="vSpd">×1</b></div>
  <div class="prow"><span>波の余韻</span><input id="sDmp" type="range" min="0" max="100" value="37"><b id="vDmp">ふつう</b></div>
</div>
<div id="card">
  <div class="head">
    <span id="cardChip"></span>
    <h2 id="cardName"></h2><em id="cardSci"></em>
    <button id="cardX" title="とじる">×</button>
  </div>
  <p id="cardDesc"></p>
</div>
<input type="file" id="fPhoto" accept="image/*" hidden>
<div id="wtoast" role="status"></div>
<div id="err">このブラウザではWebGLが利用できないため表示できません。<br>別のブラウザでお試しください。</div>

<script>
'use strict';
/* =========================================================
   Aquarium — パステルの水面シミュレーション＋魚大図鑑
   ・波: CPUで波動方程式（軽量グリッド）→ 法線マップをGPUへ
   ・描画: WebGLで背景写真を屈折・きらめき付きで合成
   ・魚: 別レイヤのWebGLで3Dメッシュを描画。遠近カメラで潜り/浮上、
         頂点シェーダで体をうねらせて泳ぐ。クリックで図鑑カード表示
   ========================================================= */
const glc = document.getElementById('gl');
const g3c = document.getElementById('g3');
const DPR = Math.min(window.devicePixelRatio||1, 1.5);

/* ---------------- WebGL setup ---------------- */
const gl = glc.getContext('webgl', {antialias:false, alpha:false})
        || glc.getContext('experimental-webgl');
if(!gl){ document.getElementById('err').style.display='flex'; throw new Error('no webgl'); }

const VS=`
attribute vec2 aPos;
varying vec2 vUv;
void main(){ vUv=aPos*0.5+0.5; vUv.y=1.0-vUv.y; gl_Position=vec4(aPos,0.,1.); }`;

const FS=`
precision mediump float;
varying vec2 vUv;
uniform sampler2D uBg;    /* 背景写真 */
uniform sampler2D uSim;   /* R,G=法線xy  B=高さ */
uniform vec2 uCover;      /* cover-fit スケール */
uniform float uTime;
uniform vec2 uRes;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }

void main(){
  vec4 sim = texture2D(uSim, vUv);
  vec2 n2 = (sim.rg - 0.5) * 2.0;      /* 法線xy (-1..1) */
  float h = (sim.b - 0.5) * 2.0;       /* 高さ */

  /* 屈折: 法線に応じて背景の参照位置をずらす */
  vec2 bgUv = 0.5 + (vUv - 0.5) * uCover;
  bgUv += n2 * 0.075;
  vec3 col = texture2D(uBg, bgUv).rgb;

  /* パステルの水色ベール */
  vec3 tintA = vec3(0.78, 0.93, 0.90);   /* ミント */
  vec3 tintB = vec3(0.99, 0.88, 0.93);   /* さくら */
  vec3 tint = mix(tintA, tintB, vUv.y*0.8 + vUv.x*0.2);
  col = mix(col, tint, 0.16);

  /* 照明: 波のハイライトときらめき */
  vec3 N = normalize(vec3(n2*2.6, 1.0));
  vec3 L = normalize(vec3(-0.35, -0.55, 0.75));
  float spec = pow(max(dot(N, L), 0.0), 26.0);
  col += spec * vec3(1.0, 0.98, 0.92) * 0.5;

  /* 波の山に淡い光、谷に淡い影 */
  col += h * 0.16 * vec3(1.0, 0.97, 0.95);

  /* キラキラ（時間で瞬く微細な粒。波が動いている場所ほどきらめく） */
  vec2 gp = floor(vUv * uRes / 3.0);
  float tw = hash(gp + floor(uTime*2.0));
  float twinkle = 0.5 + 0.5*sin(uTime*6.0 + tw*40.0);
  float activity = min(1.0, length(n2)*6.0);
  float sparkle = step(0.9985, tw) * twinkle * (0.12 + activity*0.75);
  col += sparkle * (0.6 + spec*2.0) * vec3(1.0, 0.99, 0.95);

  /* まわりを柔らかく落とす */
  float d = distance(vUv, vec2(0.5));
  col *= 1.0 - d*d*0.35;

  gl_FragColor = vec4(col, 1.0);
}`;

function makeShader(type, src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const quad=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const U={
  bg:gl.getUniformLocation(prog,'uBg'),
  sim:gl.getUniformLocation(prog,'uSim'),
  cover:gl.getUniformLocation(prog,'uCover'),
  time:gl.getUniformLocation(prog,'uTime'),
  res:gl.getUniformLocation(prog,'uRes'),
};
gl.uniform1i(U.bg,0);
gl.uniform1i(U.sim,1);

function makeTex(unit){
  const t=gl.createTexture();
  gl.activeTexture(gl.TEXTURE0+unit);
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  return t;
}
const texBg=makeTex(0);
const texSim=makeTex(1);

/* ---------------- 波シミュレーション（CPU） ---------------- */
let GW=0, GH=0, h1, h2, simPix;
let DAMP=0.98981;     /* 波の余韻（減衰率）: スライダー37=「ふつう」相当 */
let STRENGTH=0.1;     /* 波の強さ倍率: 10%。魚がおどろかない静かな水面 */
let SPEED=1;          /* 1フレームあたりの伝播ステップ数 */

function initSim(){
  const aspect=innerWidth/innerHeight;
  GW = aspect>=1 ? 280 : Math.round(280*aspect);
  GH = Math.round(GW/aspect);
  GW=Math.max(80,GW); GH=Math.max(80,GH);
  h1=new Float32Array(GW*GH);
  h2=new Float32Array(GW*GH);
  simPix=new Uint8Array(GW*GH*4);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,texSim);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,GW,GH,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
}
function stepSim(){
  for(let y=1;y<GH-1;y++){
    const row=y*GW;
    for(let x=1;x<GW-1;x++){
      const i=row+x;
      let v=((h1[i-1]+h1[i+1]+h1[i-GW]+h1[i+GW])*0.5 - h2[i])*DAMP;
      h2[i]=v;
    }
  }
  const t=h1; h1=h2; h2=t;
}
function uploadSim(){
  const K=110, KH=90;
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      const i=y*GW+x, o=i*4;
      const xl=x>0?h1[i-1]:0, xr=x<GW-1?h1[i+1]:0;
      const yu=y>0?h1[i-GW]:0, yd=y<GH-1?h1[i+GW]:0;
      let nx=128+(xr-xl)*K; nx=nx<0?0:nx>255?255:nx;
      let ny=128+(yd-yu)*K; ny=ny<0?0:ny>255?255:ny;
      let hh=128+h1[i]*KH; hh=hh<0?0:hh>255?255:hh;
      simPix[o]=nx; simPix[o+1]=ny; simPix[o+2]=hh; simPix[o+3]=255;
    }
  }
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,texSim);
  gl.texSubImage2D(gl.TEXTURE_2D,0,0,0,GW,GH,gl.RGBA,gl.UNSIGNED_BYTE,simPix);
}
function drop(nx,ny,rad,power){
  const cx=nx*GW, cy=ny*GH;
  const r=Math.max(2,rad);
  const x0=Math.max(1,Math.floor(cx-r)), x1=Math.min(GW-2,Math.ceil(cx+r));
  const y0=Math.max(1,Math.floor(cy-r)), y1=Math.min(GH-2,Math.ceil(cy+r));
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      const dx=(x-cx)/r, dy=(y-cy)/r;
      const d2=dx*dx+dy*dy;
      if(d2<1){
        h1[y*GW+x]+=power*Math.cos(d2*Math.PI/2);
      }
    }
  }
}

/* ---------------- 背景（内蔵パステル or 写真） ---------------- */
let bgW=1024, bgH=1024;
function pastelBackground(){
  // パステルの「池の底」。小石のディテールがあると波の屈折がよく見える
  const c=document.createElement('canvas'); c.width=c.height=1024;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,300,1024);
  g.addColorStop(0,'#c4e8dc');
  g.addColorStop(.45,'#ffdce9');
  g.addColorStop(1,'#ddd0f5');
  x.fillStyle=g; x.fillRect(0,0,1024,1024);
  // 小石（やわらかい色調のだ円をランダムに敷き詰める）
  const stones=['#f6ece6','#e3f0ec','#ece4f4','#fbe8ee','#eef0e2','#e6ecf6'];
  const shade='rgba(120,110,140,.16)';
  for(let i=0;i<300;i++){
    const bx=Math.random()*1024, by=Math.random()*1024;
    const r=10+Math.random()*26;
    const ry=r*(0.7+Math.random()*0.3);
    const rot=Math.random()*Math.PI;
    x.save();
    x.translate(bx,by); x.rotate(rot);
    // 影
    x.fillStyle=shade;
    x.beginPath(); x.ellipse(3,4,r,ry,0,0,Math.PI*2); x.fill();
    // 石本体
    const gg=x.createRadialGradient(-r*.3,-ry*.4,r*.1, 0,0,r);
    const base=stones[i%stones.length];
    gg.addColorStop(0,'#ffffff');
    gg.addColorStop(.25,base);
    gg.addColorStop(1, base);
    x.fillStyle=gg;
    x.beginPath(); x.ellipse(0,0,r,ry,0,0,Math.PI*2); x.fill();
    x.restore();
  }
  // やわらかい光の玉（ボケ）
  for(let i=0;i<18;i++){
    const bx=Math.random()*1024, by=Math.random()*1024;
    const r=60+Math.random()*160;
    const gg=x.createRadialGradient(bx,by,0,bx,by,r);
    const a=.08+Math.random()*.1;
    gg.addColorStop(0,`rgba(255,255,255,${a})`);
    gg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=gg;
    x.beginPath(); x.arc(bx,by,r,0,Math.PI*2); x.fill();
  }
  return c;
}
function setBg(source,w,h){
  bgW=w; bgH=h;
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,texBg);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,source);
  updateCover();
}
function updateCover(){
  const sa=innerWidth/innerHeight, ba=bgW/bgH;
  let cx=1, cy=1;
  if(ba>sa) cx=sa/ba; else cy=ba/sa;
  gl.uniform2f(U.cover,cx,cy);
}
function wtoast(msg){
  const t=document.getElementById('wtoast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),2800);
}
function setBgFromImage(img){
  // 大きすぎる写真は縮小してから使う（スマホ負荷対策）
  const M=2048;
  let w=img.naturalWidth,h=img.naturalHeight;
  const s=Math.min(1,M/Math.max(w,h));
  w=Math.round(w*s); h=Math.round(h*s);
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  setBg(c,w,h);
}
function loadPhoto(file){
  if(!file) return;
  if(!file.type.startsWith('image/')){ wtoast('画像ファイルを選んでください'); return; }
  const img=new Image();
  img.onload=()=>{
    URL.revokeObjectURL(img.src);
    setBgFromImage(img);
    wtoast('写真を水面の下に沈めました');
  };
  img.onerror=()=>{ wtoast('画像を読み込めませんでした'); };
  img.src=URL.createObjectURL(file);

document.getElementById('bPhoto').addEventListener('click',()=>document.getElementById('fPhoto').click());

  loadPhoto(e.target.files[0]); e.target.value='';
});
document.getElementById('bCalm').addEventListener('click',()=>{ h1.fill(0); h2.fill(0); });
/* ---- 調整パネル ---- */
document.getElementById('bAdj').addEventListener('click',()=>{
  document.getElementById('panel').classList.toggle('show');
});
document.getElementById('sPow').addEventListener('input',e=>{
  STRENGTH=e.target.value/100;
  document.getElementById('vPow').textContent=e.target.value+'%';
});
document.getElementById('sSpd').addEventListener('input',e=>{
  SPEED=parseInt(e.target.value);
  document.getElementById('vSpd').textContent='×'+SPEED;
});
document.getElementById('sDmp').addEventListener('input',e=>{
  const v=parseInt(e.target.value);
  DAMP=0.985+v/100*0.013;   /* 0.985（すぐ消える）〜 0.998（長く残る） */
  const label=v<25?'短い':v<50?'ふつう':v<80?'長め':'とても長い';
  document.getElementById('vDmp').textContent=label;
});
addEventListener('dragover',e=>e.preventDefault());
addEventListener('drop',e=>{ e.preventDefault(); loadPhoto(e.dataTransfer.files[0]); });

    info:'黄色い体に、目を隠す黒い帯。どこが頭かわかりにくくして、敵の狙いをはずします。サンゴ礁をちょうのようにひらひらと泳ぎます。',
    paint(g){
      g.fillStyle='#222222'; g.fillRect(216,0,22,128);
    }},
  { name:'ツノダシ', sci:'Zanclus cornutus', chip:'#e8d34a',
    back:'#f2efe6', belly:'#ffffff', fin:'#f2ce3a',
    prop:[0.9,0.85,1.4], size:[30,40],
    info:'白・黒・黄のしま模様と、リボンのように長くのびる背びれが目印。サンゴ礁を小さな群れでのんびり旅します。英名は「ムーリッシュアイドル」。',
    paint(g){
      g.fillStyle='#20201e'; g.fillRect(52,0,52,128); g.fillRect(150,0,46,128);
      g.fillStyle='rgba(242,206,58,.8)'; g.fillRect(104,0,46,128);
    }},
  { name:'マダイ', sci:'Pagrus major', chip:'#d94f66',
    back:'#d94f66', belly:'#f6c9c4', fin:'#e8788c',
    prop:[1.1,1.0,1.1], size:[40,52],
    info:'桜色の体に、光る青い小さな斑点をちりばめたお祝いの魚。「めでたい」の語呂合わせで祝いの席の主役に。じつは20年以上生きることもある長寿の魚です。',
    paint(g){
      g.fillStyle='#8fdcef';
      for(let i=0;i<40;i++){
        const x=30+Math.random()*200;
        const y=Math.random()<.5? 6+Math.random()*34 : 88+Math.random()*34;
        g.beginPath(); g.arc(x,y,1.6,0,Math.PI*2); g.fill();
      }
    }},
  { name:'マサバ', sci:'Scomber japonicus', chip:'#37808e',
    back:'#37808e', belly:'#e6edee', fin:'#7f98a0',
    prop:[1.35,0.85,0.8], size:[42,54],
    info:'背中のさざ波もようは、上から見ると波にとけこむ迷彩服。時速数十キロで泳ぐスピードスターで、青魚の代表選手です。',
    paint(g){
      g.strokeStyle='#173038'; g.lineWidth=2.5;
      for(let k=0;k<9;k++){
        const x0=26+k*24;
        [0,128].forEach(edge=>{
          g.beginPath();
          for(let yy=0;yy<=26;yy+=2){
            const y=edge===0?yy:128-yy;
            const x=x0+Math.sin(yy*.5+k)*5;
            yy===0?g.moveTo(x,y):g.lineTo(x,y);
          }
          g.stroke();
        });
      }
    }},
];

/* --- 3Dシェーダ（体のうねりは頂点シェーダで付ける） --- */
const FVS=`
attribute vec3 aP; attribute vec3 aN; attribute vec2 aT;
uniform mat4 uMVP; uniform vec2 uRot; uniform float uWag; uniform float uFog;
varying vec3 vN; varying vec2 vT; varying float vFog;
void main(){
  vec3 p=aP;
  float amp=0.15*(1.0-smoothstep(-0.8,0.25,p.x));
  p.y+=sin(uWag-p.x*3.5)*amp;
  vN=vec3(uRot.x*aN.x-uRot.y*aN.y, uRot.y*aN.x+uRot.x*aN.y, aN.z);
  vT=aT; vFog=uFog;
  gl_Position=uMVP*vec4(p,1.);
}`;
const FFS=`
precision mediump float;
uniform sampler2D uTex;
varying vec3 vN; varying vec2 vT; varying float vFog;
void main(){
  vec3 col=texture2D(uTex,vT).rgb;
  float d=abs(dot(normalize(vN),normalize(vec3(-.3,-.25,-.91))));
  col*=.6+.5*d;
  col=mix(col,vec3(.42,.62,.66),vFog);
  gl_FragColor=vec4(col,1.);
}`;
function sh3(type,src){ const s=g3.createShader(type); g3.shaderSource(s,src); g3.compileShader(s); return s; }
const prog3=g3.createProgram();
g3.attachShader(prog3,sh3(g3.VERTEX_SHADER,FVS));
g3.attachShader(prog3,sh3(g3.FRAGMENT_SHADER,FFS));
g3.linkProgram(prog3); g3.useProgram(prog3);
const U3={
  mvp:g3.getUniformLocation(prog3,'uMVP'),
  rot:g3.getUniformLocation(prog3,'uRot'),
  wag:g3.getUniformLocation(prog3,'uWag'),
  fog:g3.getUniformLocation(prog3,'uFog'),
};
g3.enable(g3.DEPTH_TEST);
g3.disable(g3.CULL_FACE); // ヒレは薄板なので両面描く

/* --- 魚メッシュ（体長≒1の単位サイズ。+xが頭、+zが下＝腹側） --- */
const MESH=(()=>{
  const P=[],N=[],T=[],I=[];
  const SEG=26,RING=16;
  const hw=s=>0.17*Math.sin(Math.PI*Math.pow(s,0.85))+0.002; // 半幅(y)
  const hh=s=>0.30*Math.sin(Math.PI*Math.pow(s,0.9))+0.002;  // 半高(z)
  const px=(s,a)=>[-0.48+0.98*s, Math.sin(a)*hw(s), -Math.cos(a)*hh(s)];
  // 胴体（回転体グリッド。テクスチャは u=尾→頭 / v=背→右→腹→左→背）
  for(let i=0;i<=SEG;i++){
    const s=i/SEG;
    for(let j=0;j<=RING;j++){
      const a=j/RING*Math.PI*2;
      P.push(...px(s,a));
      T.push(0.07+0.93*s, j/RING);
      // 法線はパラメータ微分の外積（数値）
      const e=1e-3;
      const p1=px(Math.min(1,s+e),a), p0=px(Math.max(0,s-e),a);
      const q1=px(s,a+e), q0=px(s,a-e);
      const ds=[p1[0]-p0[0],p1[1]-p0[1],p1[2]-p0[2]];
      const da=[q1[0]-q0[0],q1[1]-q0[1],q1[2]-q0[2]];
      let nx=da[1]*ds[2]-da[2]*ds[1],
          ny=da[2]*ds[0]-da[0]*ds[2],
          nz=da[0]*ds[1]-da[1]*ds[0];
      const l=Math.hypot(nx,ny,nz)||1;
      N.push(nx/l,ny/l,nz/l);
    }
  }
  for(let i=0;i<SEG;i++)for(let j=0;j<RING;j++){
    const a=i*(RING+1)+j, b=a+RING+1;
    I.push(a,b,b+1, a,b+1,a+1);
  }
  // 薄板ヒレ追加ヘルパ（y=0平面、UVはテクスチャ左端のヒレ色帯）
  function fin(verts){
    const base=P.length/3;
    for(const v of verts){ P.push(v[0],v[1],v[2]); N.push(0,1,0); T.push(0.02,0.5); }
    for(let k=1;k<verts.length-1;k++) I.push(base,base+k,base+k+1);
  }
  // 尾びれ（後端がフォーク状）
  {
    const vs=[[-0.44,0,0]];
    for(let k=0;k<=6;k++){
      const z=-0.26+k/6*0.52;
      vs.push([-0.70-0.14*Math.abs(k/6-0.5)*2, 0, z]);
    }
    fin(vs);
  }
  // 背びれ（背中の稜線に沿った薄板）
  {
    const base=P.length/3;
    for(let k=0;k<=5;k++){
      const x=-0.05+k/5*0.33, s=(x+0.48)/0.98;
      const zb=-hh(s)+0.02, zt=zb-0.08-0.06*(1-k/5);
      P.push(x,0,zb, x,0,zt);
      N.push(0,1,0, 0,1,0);
      T.push(0.02,0.5, 0.02,0.5);
    }
    for(let k=0;k<5;k++){
      const a=base+k*2;
      I.push(a,a+1,a+3, a,a+3,a+2);
    }
  }
  // 胸びれ（左右）
  for(const sd of [1,-1]){
    fin([[0.16,0.15*sd,0.05],[0.02,0.32*sd,0.11],[0.08,0.26*sd,0.09]]);
  }
  return {pos:new Float32Array(P),nor:new Float32Array(N),uv:new Float32Array(T),idx:new Uint16Array(I),n:I.length};
})();
function buf3(target,data){ const b=g3.createBuffer(); g3.bindBuffer(target,b); g3.bufferData(target,data,g3.STATIC_DRAW); return b; }
const bPos=buf3(g3.ARRAY_BUFFER,MESH.pos);
const bNor=buf3(g3.ARRAY_BUFFER,MESH.nor);
const bUv=buf3(g3.ARRAY_BUFFER,MESH.uv);
const bIdx=buf3(g3.ELEMENT_ARRAY_BUFFER,MESH.idx);
function attr3(name,buf,size){
  const loc=g3.getAttribLocation(prog3,name);
  g3.bindBuffer(g3.ARRAY_BUFFER,buf);
  g3.enableVertexAttribArray(loc);
  g3.vertexAttribPointer(loc,size,g3.FLOAT,false,0,0);
}
attr3('aP',bPos,3); attr3('aN',bNor,3); attr3('aT',bUv,2);
g3.bindBuffer(g3.ELEMENT_ARRAY_BUFFER,bIdx);

/* --- 種ごとの皮膚テクスチャ（Canvasに描いて転送） --- */
for(const sp of FISH_SPECIES){
  const c=document.createElement('canvas'); c.width=256; c.height=128;
  const g=c.getContext('2d');
  g.fillStyle=sp.fin; g.fillRect(0,0,12,128);           // 左端＝ヒレ色帯
  const gr=g.createLinearGradient(0,0,0,128);            // 背(上下端)が濃く腹(中央)が明るい
  gr.addColorStop(0,sp.back); gr.addColorStop(.5,sp.belly); gr.addColorStop(1,sp.back);
  g.fillStyle=gr; g.fillRect(12,0,244,128);
  sp.paint(g);
  g.fillStyle='#151515';                                 // 目（背側の左右対称）
  for(const y of [14,114]){ g.beginPath(); g.arc(228,y,5,0,Math.PI*2); g.fill(); }
  const tex=g3.createTexture();
  g3.bindTexture(g3.TEXTURE_2D,tex);
  g3.texImage2D(g3.TEXTURE_2D,0,g3.RGBA,g3.RGBA,g3.UNSIGNED_BYTE,c);
  g3.texParameteri(g3.TEXTURE_2D,g3.TEXTURE_MIN_FILTER,g3.LINEAR);
  g3.texParameteri(g3.TEXTURE_2D,g3.TEXTURE_WRAP_S,g3.CLAMP_TO_EDGE);
  g3.texParameteri(g3.TEXTURE_2D,g3.TEXTURE_WRAP_T,g3.CLAMP_TO_EDGE);
  sp.tex=tex;
}

/* --- 見下ろしカメラ --- */
let camH=1000, maxD=700;
const projM=new Float32Array(16);
function updateProj(){
  camH=(innerHeight/2)/Math.tan(27.5*Math.PI/180);
  maxD=camH*0.7;
  const n=camH*0.25, f=camH+maxD+200;
  projM.fill(0);
  projM[0]=camH/(innerWidth/2);
  projM[5]=-camH/(innerHeight/2);
  projM[10]=(f+n)/(f-n);
  projM[11]=1;
  projM[14]=-2*f*n/(f-n);
}
function m4mul(a,b){
  const o=new Float32Array(16);
  for(let c=0;c<4;c++)for(let r=0;r<4;r++)
    o[c*4+r]=a[r]*b[c*4]+a[4+r]*b[c*4+1]+a[8+r]*b[c*4+2]+a[12+r]*b[c*4+3];
  return o;
}

let fish=[];
function initFish(){
  fish=[];
  const n = innerWidth<600 ? 8 : 12;
  for(let i=0;i<n;i++){
    const sp=FISH_SPECIES[i%FISH_SPECIES.length];
    // 魚同士が重ならないよう間隔を空けて配置
    let px2=innerWidth*.5, py2=innerHeight*.5;
    for(let tries=0;tries<40;tries++){
      px2=60+Math.random()*(innerWidth-120);
      py2=60+Math.random()*(innerHeight-120);
      if(fish.every(o=>Math.hypot(o.x-px2,o.y-py2)>90)) break;
    }
    const L=(sp.size[0]+Math.random()*(sp.size[1]-sp.size[0]))*(innerWidth<600?.8:1);
    fish.push({
      x:px2, y:py2,
      dir:Math.random()*Math.PI*2,
      speed:14+L*0.55+Math.random()*10,
      L, sp,
      phase:Math.random()*Math.PI*2,
      wagFreq:4.5+Math.random()*2+40/L,   // 小さい魚ほど速く尾を振る
      z:Math.random(),
      zFreq:0.25+Math.random()*0.3,
      zPhase:Math.random()*Math.PI*2,
    });
  }
}
function fishDepth(f,t){
  // 2つの周期をずらして重ねる事で、機械的でない「浅い⇄深い」の揺らぎを作る
  const zc=Math.sin(t*f.zFreq+f.zPhase)*.6 + Math.sin(t*f.zFreq*1.9+f.zPhase+2.1)*.4;
  return Math.min(1,Math.max(0, zc*.5+.5));
}
function updateFish(f,dt){
  // ゆらゆらと気ままに向きを変える
  f.dir+=(Math.random()-.5)*1.6*dt;
  // 壁に近づいたら内側へ緩やかに旋回
  const m=f.L*0.8+40;
  let ax=0, ay=0;
  if(f.x<m) ax+=1;
  if(f.x>innerWidth-m) ax-=1;
  if(f.y<m) ay+=1;
  if(f.y>innerHeight-m) ay-=1;
  if(ax||ay){
    const wallDir=Math.atan2(ay,ax);
    let diff=wallDir-f.dir;
    diff=((diff+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI;
    f.dir+=diff*Math.min(1,dt*3);
  }
  // 深いところ（z大）ほどゆっくり進んで見える
  const spd=f.speed*(1-f.z*0.45);
  f.x+=Math.cos(f.dir)*spd*dt;
  f.y+=Math.sin(f.dir)*spd*dt;
  f.x=Math.min(innerWidth-4,Math.max(4,f.x));
  f.y=Math.min(innerHeight-4,Math.max(4,f.y));
  // 水面近くまで浮いてくると小さな波紋が立つ
  if(f.z<0.07&&Math.random()<0.03) drop(f.x/innerWidth,f.y/innerHeight,1.6,.22*STRENGTH);
}
function renderFish3D(t){
  g3.viewport(0,0,g3c.width,g3c.height);
  g3.clearColor(0,0,0,0);
  g3.clear(g3.COLOR_BUFFER_BIT|g3.DEPTH_BUFFER_BIT);
  for(const f of fish){
    const d=26+f.z*maxD;                 // 水面からの深さ(px相当)
    const [sx,sy,sz]=f.sp.prop;
    const c=Math.cos(f.dir), s=Math.sin(f.dir);
    // Model行列 = 平行移動 × Z回転 × 種ごとの体型スケール（列優先）
    const M=new Float32Array([
      c*sx*f.L,  s*sx*f.L, 0,0,
      -s*sy*f.L, c*sy*f.L, 0,0,
      0,0, sz*f.L, 0,
      f.x-innerWidth/2, f.y-innerHeight/2, camH+d, 1
    ]);
    g3.uniformMatrix4fv(U3.mvp,false,m4mul(projM,M));
    g3.uniform2f(U3.rot,c,s);
    g3.uniform1f(U3.wag,t*f.wagFreq+f.phase);
    g3.uniform1f(U3.fog,Math.min(1,d/maxD)*0.45);
    g3.bindTexture(g3.TEXTURE_2D,f.sp.tex);
    g3.drawElements(g3.TRIANGLES,MESH.n,g3.UNSIGNED_SHORT,0);
  }
}

/* --- 図鑑（クリックで魚をえらぶ） --- */
function pickFish(px2,py2){
  let best=null, bestD=1e9;
  for(const f of fish){
    const d=26+f.z*maxD, sc=camH/(camH+d);
    const sx=innerWidth/2+(f.x-innerWidth/2)*sc;
    const sy=innerHeight/2+(f.y-innerHeight/2)*sc;
    const rr=f.L*0.65*sc+14;
    if(Math.hypot(px2-sx,py2-sy)<rr && d<bestD){ best=f; bestD=d; }
  }
  return best;
}
const card=document.getElementById('card');
function showCard(sp){
  document.getElementById('cardChip').style.background=sp.chip;
  document.getElementById('cardName').textContent=sp.name;
  document.getElementById('cardSci').textContent=sp.sci;
  document.getElementById('cardDesc').textContent=sp.info;
  card.classList.add('show');
}
function hideCard(){ card.classList.remove('show'); }
document.getElementById('cardX').addEventListener('click',hideCard);

/* ---------------- 入力 ---------------- */
let lastP=null, hinted=false;
function hideHint(){
  if(hinted) return; hinted=true;
  document.getElementById('hint').classList.add('hide');
}
setTimeout(hideHint, 9000);
glc.addEventListener('pointermove',e=>{
  const nx=e.clientX/innerWidth, ny=e.clientY/innerHeight;
  if(lastP){
    const dist=Math.hypot(e.clientX-lastP.x, e.clientY-lastP.y);
    if(dist>4){
      drop(nx,ny, 2.6, 0.55*STRENGTH);
      lastP={x:e.clientX,y:e.clientY};
      hideHint();
    }
  }else{
    lastP={x:e.clientX,y:e.clientY};
  }
});
glc.addEventListener('pointerdown',e=>{
  const nx=e.clientX/innerWidth, ny=e.clientY/innerHeight;
  drop(nx,ny, 7, 2.4*STRENGTH);   /* クリック/タップ: 大きな波紋 */
  const hit=pickFish(e.clientX,e.clientY);
  if(hit) showCard(hit.sp); else hideCard();
  hideHint();
});
glc.addEventListener('pointerleave',()=>{ lastP=null; });

/* ---------------- resize / loop ---------------- */
function resize(){
  glc.width=Math.round(innerWidth*DPR);
  glc.height=Math.round(innerHeight*DPR);
  g3c.width=Math.round(innerWidth*DPR);
  g3c.height=Math.round(innerHeight*DPR);
  gl.viewport(0,0,glc.width,glc.height);
  gl.uniform2f(U.res, glc.width, glc.height);
  updateProj();
  initSim();
  updateCover();
}
let rsTimer=0;
addEventListener('resize',()=>{ clearTimeout(rsTimer); rsTimer=setTimeout(resize,150); });

let t0=performance.now(), lastT=0;
function loop(){
  const t=(performance.now()-t0)/1000;
  const dt=Math.min(.05,Math.max(0,t-lastT)); lastT=t;
  // ときどき雨粒のような小さな波紋（静かなとき用）
  if(Math.random()<0.006) drop(Math.random(),Math.random(),2,.35*STRENGTH);
  for(let k=0;k<SPEED;k++) stepSim();
  uploadSim();
  gl.uniform1f(U.time,t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  for(const f of fish){ f.z=fishDepth(f,t); updateFish(f,dt); }
  renderFish3D(t);   // 前後関係は深度バッファが解決する
  requestAnimationFrame(loop);
}

/* ---------------- boot ---------------- */
setBg(pastelBackground(),1024,1024);  // まず内蔵背景（デフォルト写真の読込に失敗しても水面は動く）
if(DEFAULT_PHOTO){
  const img=new Image();
  img.onload=()=>setBgFromImage(img);
  img.src=DEFAULT_PHOTO;
}
resize();
initFish();
loop();
</script>
