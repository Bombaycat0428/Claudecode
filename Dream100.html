<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dream100 | 100の夢リスト</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", Arial, sans-serif;
  }
  @keyframes fall {
    0% {
      transform: translateY(-10vh) translateX(0) rotate(0deg) scale(1);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(var(--drift)) rotate(var(--spin)) scale(0.8);
      opacity: 0;
    }
  }
  .petal {
    position: fixed;
    top: 0;
    will-change: transform, opacity;
    animation-name: fall;
    animation-timing-function: ease-in;
    animation-fill-mode: forwards;
    pointer-events: none;
    z-index: 9999;
    user-select: none;
  }
  @keyframes pop-in {
    0% { transform: scale(0.96); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: pop-in 0.2s ease-out; }

  @keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .achieved-text {
    background: linear-gradient(90deg, #0ea5e9, #2dd4bf, #0ea5e9);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 2.5s linear infinite;
  }

  #bgWater {
    position: fixed;
    inset: 0;
    z-index: -2;
    width: 100%;
    height: 100%;
    display: none;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-cyan-50 to-blue-50">
<canvas id="bgWater"></canvas>
<div id="root"></div>

<script>
const { useState, useEffect, useRef, useMemo } = React;
const html = htm.bind(React.createElement);

const STORAGE_KEY = "dream100-list-v1";
const TOTAL = 100;
const PAGE_SIZE = 20;
const PETAL_EMOJIS = ["❄️", "💧", "🫧", "✨", "🩵", "🔷", "💎"];

const YEAR_OPTIONS = [1, 5, 10];
const YEAR_GLOW = {
  1: "bg-sky-400 text-white shadow-[0_0_10px_2px_rgba(56,189,248,0.65)]",
  5: "bg-blue-500 text-white shadow-[0_0_10px_2px_rgba(59,130,246,0.65)]",
  10: "bg-indigo-600 text-white shadow-[0_0_10px_2px_rgba(99,102,241,0.65)]",
};

function emptyList() {
  return Array.from({ length: TOTAL }, () => ({ text: "", achieved: false, years: null }));
}

function loadDreams() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return emptyList();
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return emptyList();
    return normalizeList(parsed);
  } catch (e) {
    return emptyList();
  }
}

function normalizeList(parsed) {
  const next = emptyList();
  for (let i = 0; i < TOTAL; i++) {
    const item = parsed[i];
    if (item && typeof item === "object") {
      next[i] = {
        text: String(item.text ?? "").slice(0, 200),
        achieved: !!item.achieved,
        years: YEAR_OPTIONS.includes(item.years) ? item.years : null,
      };
    }
  }
  return next;
}

function saveDreams(dreams) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(dreams));
}

function Icon({ name, className }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = "";
    const el = document.createElement("i");
    el.setAttribute("data-lucide", name);
    ref.current.appendChild(el);
    lucide.createIcons({ icons: lucide.icons, root: ref.current });
  }, [name]);
  return html`<span ref=${ref} className=${className}></span>`;
}

function FlowerBurst({ burstId, onDone }) {
  const particles = useMemo(() => {
    const count = 70;
    return Array.from({ length: count }, (_, i) => {
      const left = Math.random() * 100;
      const size = 16 + Math.random() * 22;
      const duration = 2.6 + Math.random() * 2.2;
      const delay = Math.random() * 0.6;
      const drift = (Math.random() - 0.5) * 220;
      const spin = (Math.random() - 0.5) * 720;
      const emoji = PETAL_EMOJIS[Math.floor(Math.random() * PETAL_EMOJIS.length)];
      return { id: i, left, size, duration, delay, drift, spin, emoji };
    });
  }, [burstId]);

  useEffect(() => {
    const maxLife = Math.max(...particles.map(p => p.delay + p.duration)) * 1000 + 200;
    const t = setTimeout(() => onDone(burstId), maxLife);
    return () => clearTimeout(t);
  }, []);

  return html`
    <div className="fixed inset-0 overflow-hidden pointer-events-none">
      ${particles.map(p => html`
        <span
          key=${p.id}
          className="petal"
          style=${{
            left: `${p.left}%`,
            fontSize: `${p.size}px`,
            animationDuration: `${p.duration}s`,
            animationDelay: `${p.delay}s`,
            "--drift": `${p.drift}px`,
            "--spin": `${p.spin}deg`,
          }}
        >${p.emoji}</span>
      `)}
    </div>
  `;
}

function DreamRow({ index, dream, onChangeText, onToggle, onSetYears, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver }) {
  const num = String(index + 1).padStart(2, "0");
  const filled = dream.text.trim().length > 0;

  return html`
    <li
      onDragOver=${(e) => { e.preventDefault(); onDragOver(index); }}
      onDragLeave=${() => onDragOver(null)}
      onDrop=${(e) => { e.preventDefault(); onDrop(index); }}
      className="pop-in flex items-center gap-2 rounded-xl border px-3 py-2.5 transition shadow-sm ${
        dream.achieved
          ? "bg-gradient-to-r from-teal-50 to-sky-50 border-teal-200"
          : "bg-white border-sky-100 hover:border-sky-300"
      } ${isDragOver ? "ring-2 ring-sky-400" : ""} ${isDragging ? "opacity-40" : ""}"
    >
      <span
        draggable="true"
        onDragStart=${() => onDragStart(index)}
        onDragEnd=${onDragEnd}
        aria-label="ドラッグして並び替え"
        className="flex-shrink-0 text-sky-200 hover:text-sky-400 cursor-grab active:cursor-grabbing"
      >
        <${Icon} name="grip-vertical" className="[&_svg]:w-4 [&_svg]:h-4" />
      </span>

      <span className="flex-shrink-0 w-9 text-center text-sm font-bold text-sky-300 tabular-nums">
        ${num}
      </span>

      <button
        onClick=${() => onToggle(index)}
        disabled=${!filled}
        aria-label="達成チェック"
        className="flex-shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center transition ${
          dream.achieved
            ? "bg-teal-400 border-teal-400 text-white"
            : filled
              ? "border-sky-300 hover:border-sky-400 text-transparent"
              : "border-sky-100 text-transparent cursor-not-allowed"
        }"
      >
        <${Icon} name="check" className="[&_svg]:w-4 [&_svg]:h-4" />
      </button>

      <input
        type="text"
        value=${dream.text}
        onChange=${(e) => onChangeText(index, e.target.value)}
        placeholder="${index + 1}番目に叶えたいことを書く"
        className="flex-1 min-w-0 bg-transparent focus:outline-none text-sm md:text-base ${
          dream.achieved ? "achieved-text font-semibold line-through" : "text-sky-900"
        }"
      />

      <div className="flex-shrink-0 flex items-center gap-1">
        ${YEAR_OPTIONS.map(y => html`
          <button
            key=${y}
            onClick=${() => onSetYears(index, y)}
            disabled=${!filled}
            className="w-9 h-7 rounded-full text-[11px] font-bold transition ${
              dream.years === y
                ? YEAR_GLOW[y]
                : filled
                  ? "bg-white/70 border border-sky-200 text-sky-400 hover:bg-white"
                  : "bg-white/40 border border-sky-100 text-sky-200 cursor-not-allowed"
            }"
          >${y}Y</button>
        `)}
      </div>
    </li>
  `;
}

function App() {
  const [dreams, setDreams] = useState(loadDreams);
  const [bursts, setBursts] = useState([]);
  const [filter, setFilter] = useState("all"); // all | filled | empty | achieved
  const [page, setPage] = useState(0);
  const [importMsg, setImportMsg] = useState("");
  const [dragIndex, setDragIndex] = useState(null);
  const [dragOverIndex, setDragOverIndex] = useState(null);
  const fileInputRef = useRef(null);
  const photoInputRef = useRef(null);

  useEffect(() => {
    saveDreams(dreams);
  }, [dreams]);

  useEffect(() => {
    window.DreamWater && window.DreamWater.start();
  }, []);

  const filledCount = dreams.filter(d => d.text.trim().length > 0).length;
  const achievedCount = dreams.filter(d => d.achieved).length;
  const progressPct = Math.round((achievedCount / TOTAL) * 100);

  const changeText = (index, text) => {
    setDreams(prev => {
      const next = [...prev];
      const willClear = text.trim().length === 0;
      next[index] = {
        ...next[index],
        text,
        achieved: willClear ? false : next[index].achieved,
        years: willClear ? null : next[index].years,
      };
      return next;
    });
  };

  const toggleAchieved = (index) => {
    setDreams(prev => {
      const target = prev[index];
      if (!target.text.trim()) return prev;
      const willAchieve = !target.achieved;
      if (willAchieve) {
        const burstId = crypto.randomUUID();
        setBursts(b => [...b, burstId]);
      }
      const next = [...prev];
      next[index] = { ...target, achieved: willAchieve };
      return next;
    });
  };

  const removeBurst = (id) => {
    setBursts(b => b.filter(x => x !== id));
  };

  const setYears = (index, years) => {
    setDreams(prev => {
      const target = prev[index];
      if (!target.text.trim()) return prev;
      const next = [...prev];
      next[index] = { ...target, years: target.years === years ? null : years };
      return next;
    });
  };

  const handleDragStart = (index) => setDragIndex(index);
  const handleDragOver = (index) => setDragOverIndex(index);
  const handleDragEnd = () => {
    setDragIndex(null);
    setDragOverIndex(null);
  };
  const handleDrop = (targetIndex) => {
    if (dragIndex === null || dragIndex === targetIndex) {
      setDragIndex(null);
      setDragOverIndex(null);
      return;
    }
    setDreams(prev => {
      const next = [...prev];
      const [moved] = next.splice(dragIndex, 1);
      next.splice(targetIndex, 0, moved);
      return next;
    });
    setDragIndex(null);
    setDragOverIndex(null);
  };

  const visibleIndices = useMemo(() => {
    return dreams
      .map((d, i) => i)
      .filter(i => {
        const d = dreams[i];
        if (filter === "filled") return d.text.trim().length > 0;
        if (filter === "empty") return d.text.trim().length === 0;
        if (filter === "achieved") return d.achieved;
        return true;
      });
  }, [dreams, filter]);

  const totalPages = Math.max(1, Math.ceil(visibleIndices.length / PAGE_SIZE));
  const currentPage = Math.min(page, totalPages - 1);
  const pageIndices = visibleIndices.slice(currentPage * PAGE_SIZE, currentPage * PAGE_SIZE + PAGE_SIZE);

  const changeFilter = (key) => {
    setFilter(key);
    setPage(0);
  };

  const exportDreams = () => {
    const blob = new Blob([JSON.stringify(dreams, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `dream100_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const importDreams = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!Array.isArray(parsed)) throw new Error("配列形式のJSONではありません");
        if (!confirm(`現在の100個の内容を上書きします。よろしいですか？`)) return;
        setDreams(normalizeList(parsed));
        setImportMsg(`インポート完了: ${Math.min(parsed.length, TOTAL)}件を読み込みました`);
      } catch (e) {
        setImportMsg("読み込みに失敗しました: " + e.message);
      }
    };
    reader.onerror = () => setImportMsg("ファイル読み込みエラーが発生しました");
    reader.readAsText(file, "UTF-8");
  };

  const filterTabs = [
    { key: "all", label: "すべて" },
    { key: "empty", label: "未記入" },
    { key: "filled", label: "記入済み" },
    { key: "achieved", label: "達成済み" },
  ];

  return html`
    <div className="min-h-screen px-4 py-10 md:py-14">
      <div className="max-w-2xl mx-auto">
        <header className="text-center mb-8">
          <div className="inline-flex items-center gap-2 mb-2">
            <${Icon} name="moon-star" className="text-cyan-400 [&_svg]:w-7 [&_svg]:h-7" />
            <h1 className="text-3xl md:text-4xl font-bold text-sky-900 tracking-tight">Dream100</h1>
          </div>
          <p className="text-sky-400 text-sm">人生で叶えたい100の夢を、ひとつずつ書き記そう</p>
        </header>

        <div className="flex justify-center gap-2 mb-6">
          <button
            onClick=${() => photoInputRef.current?.click()}
            className="inline-flex items-center gap-1.5 rounded-full bg-white/70 border border-sky-200 text-sky-600 text-xs font-semibold px-3.5 py-1.5 shadow-sm hover:bg-white active:scale-95 transition"
          >
            <${Icon} name="image" className="[&_svg]:w-3.5 [&_svg]:h-3.5" />
            写真を変更
          </button>
          <input
            ref=${photoInputRef}
            type="file"
            accept="image/*"
            style=${{ display: "none" }}
            onChange=${(e) => {
              const f = e.target.files[0];
              if (f) window.DreamWater && window.DreamWater.setPhoto(f);
              e.target.value = "";
            }}
          />
          <button
            onClick=${exportDreams}
            className="inline-flex items-center gap-1.5 rounded-full bg-white/70 border border-sky-200 text-sky-600 text-xs font-semibold px-3.5 py-1.5 shadow-sm hover:bg-white active:scale-95 transition"
          >
            <${Icon} name="download" className="[&_svg]:w-3.5 [&_svg]:h-3.5" />
            エクスポート
          </button>
          <button
            onClick=${() => fileInputRef.current?.click()}
            className="inline-flex items-center gap-1.5 rounded-full bg-white/70 border border-sky-200 text-sky-600 text-xs font-semibold px-3.5 py-1.5 shadow-sm hover:bg-white active:scale-95 transition"
          >
            <${Icon} name="upload" className="[&_svg]:w-3.5 [&_svg]:h-3.5" />
            インポート
          </button>
          <input
            ref=${fileInputRef}
            type="file"
            accept="application/json,.json"
            style=${{ display: "none" }}
            onChange=${(e) => {
              const f = e.target.files[0];
              if (f) importDreams(f);
              e.target.value = "";
            }}
          />
        </div>
        ${importMsg && html`<p className="text-center text-xs text-sky-400 mb-6">${importMsg}</p>`}

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div className="bg-white/70 rounded-xl p-3 text-center shadow-sm border border-sky-100">
            <p className="text-2xl font-bold text-sky-700">${filledCount}<span className="text-sm text-sky-300">/${TOTAL}</span></p>
            <p className="text-xs text-sky-400">記入済み</p>
          </div>
          <div className="bg-white/70 rounded-xl p-3 text-center shadow-sm border border-sky-100">
            <p className="text-2xl font-bold text-teal-500">${achievedCount}<span className="text-sm text-sky-300">/${TOTAL}</span></p>
            <p className="text-xs text-sky-400">達成した夢</p>
          </div>
        </div>

        <div className="mb-8">
          <div className="h-2.5 w-full rounded-full bg-sky-100 overflow-hidden">
            <div
              className="h-full rounded-full bg-gradient-to-r from-sky-400 to-teal-400 transition-all duration-500"
              style=${{ width: `${progressPct}%` }}
            ></div>
          </div>
          <p className="text-right text-xs text-sky-400 mt-1">${progressPct}% 達成</p>
        </div>

        <div className="flex justify-center gap-1.5 mb-4">
          ${filterTabs.map(tab => html`
            <button
              key=${tab.key}
              onClick=${() => changeFilter(tab.key)}
              className="text-xs font-semibold px-3 py-1.5 rounded-full transition ${
                filter === tab.key
                  ? "bg-sky-400 text-white shadow-sm"
                  : "bg-white/70 text-sky-500 border border-sky-200 hover:bg-white"
              }"
            >${tab.label}</button>
          `)}
        </div>

        ${totalPages > 1 && html`
          <div className="flex flex-wrap justify-center gap-1.5 mb-4">
            ${Array.from({ length: totalPages }, (_, p) => html`
              <button
                key=${p}
                onClick=${() => setPage(p)}
                className="w-8 h-8 text-xs font-bold rounded-full transition ${
                  p === currentPage
                    ? "bg-sky-500 text-white shadow-sm"
                    : "bg-white/70 text-sky-500 border border-sky-200 hover:bg-white"
                }"
              >${p + 1}</button>
            `)}
          </div>
        `}

        ${visibleIndices.length > 0 && html`<p className="text-center text-xs text-sky-300 mb-3">各項目左端のハンドル(⋮⋮)をドラッグすると順番を入れ替えられます</p>`}

        ${visibleIndices.length === 0
          ? html`<p className="text-center text-sky-300 py-10">該当する項目がありません。</p>`
          : html`<ul className="space-y-2">
              ${pageIndices.map(i => html`<${DreamRow}
                key=${i}
                index=${i}
                dream=${dreams[i]}
                onChangeText=${changeText}
                onToggle=${toggleAchieved}
                onSetYears=${setYears}
                onDragStart=${handleDragStart}
                onDragOver=${handleDragOver}
                onDrop=${handleDrop}
                onDragEnd=${handleDragEnd}
                isDragging=${dragIndex === i}
                isDragOver=${dragOverIndex === i && dragIndex !== i}
              />`)}
            </ul>`
        }

        <footer className="text-center text-sky-300 text-xs mt-10">
          データはこのブラウザに自動で保存されます
        </footer>
      </div>

      ${bursts.map(id => html`<${FlowerBurst} key=${id} burstId=${id} onDone=${removeBurst} />`)}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>

<script>
/* =========================================================
   波紋アニメーション背景（apps/water-garden/aquarium.html の
   水面表現部分を配色ごとそのまま移植。魚・写真アップロードは含まない）
   ========================================================= */
(function () {
  'use strict';
  const canvas = document.getElementById('bgWater');

    GW = Math.max(80, GW); GH = Math.max(80, GH);
    h1 = new Float32Array(GW * GH);
    h2 = new Float32Array(GW * GH);
    simPix = new Uint8Array(GW * GH * 4);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, texSim);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, GW, GH, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  }

  function stepSim() {
    for (let y = 1; y < GH - 1; y++) {
      const row = y * GW;
      for (let x = 1; x < GW - 1; x++) {
        const i = row + x;
        h2[i] = ((h1[i-1]+h1[i+1]+h1[i-GW]+h1[i+GW])*0.5 - h2[i]) * DAMP;
      }
    }
    const t = h1; h1 = h2; h2 = t;
  }

  function uploadSim() {
    const K = 110, KH = 90;
    for (let y = 0; y < GH; y++) {
      for (let x = 0; x < GW; x++) {
        const i = y*GW+x, o = i*4;
        const xl = x>0?h1[i-1]:0, xr = x<GW-1?h1[i+1]:0;
        const yu = y>0?h1[i-GW]:0, yd = y<GH-1?h1[i+GW]:0;
        let nx = 128+(xr-xl)*K; nx = nx<0?0:nx>255?255:nx;
        let ny = 128+(yd-yu)*K; ny = ny<0?0:ny>255?255:ny;
        let hh = 128+h1[i]*KH; hh = hh<0?0:hh>255?255:hh;
        simPix[o]=nx; simPix[o+1]=ny; simPix[o+2]=hh; simPix[o+3]=255;
      }
    }
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, texSim);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, GW, GH, gl.RGBA, gl.UNSIGNED_BYTE, simPix);
  }

  function drop(nx, ny, rad, power) {
    const cx = nx*GW, cy = ny*GH;
    const r = Math.max(2, rad);
    const x0 = Math.max(1, Math.floor(cx-r)), x1 = Math.min(GW-2, Math.ceil(cx+r));
    const y0 = Math.max(1, Math.floor(cy-r)), y1 = Math.min(GH-2, Math.ceil(cy+r));
    for (let y = y0; y <= y1; y++) {
      for (let x = x0; x <= x1; x++) {
        const dx = (x-cx)/r, dy = (y-cy)/r;
        const d2 = dx*dx+dy*dy;
        if (d2 < 1) h1[y*GW+x] += power * Math.cos(d2*Math.PI/2);
      }
    }
  }

  function pastelBackground() {
    const c = document.createElement('canvas'); c.width = c.height = 1024;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0, 0, 300, 1024);
    g.addColorStop(0, '#c4e8dc');
    g.addColorStop(0.45, '#ffdce9');
    g.addColorStop(1, '#ddd0f5');
    x.fillStyle = g; x.fillRect(0, 0, 1024, 1024);
    const stones = ['#f6ece6', '#e3f0ec', '#ece4f4', '#fbe8ee', '#eef0e2', '#e6ecf6'];
    const shade = 'rgba(120,110,140,.16)';
    for (let i = 0; i < 300; i++) {
      const bx = Math.random()*1024, by = Math.random()*1024;
      const r = 10+Math.random()*26;
      const ry = r*(0.7+Math.random()*0.3);
      const rot = Math.random()*Math.PI;
      x.save();
      x.translate(bx, by); x.rotate(rot);
      x.fillStyle = shade;
      x.beginPath(); x.ellipse(3, 4, r, ry, 0, 0, Math.PI*2); x.fill();
      const gg = x.createRadialGradient(-r*.3, -ry*.4, r*.1, 0, 0, r);
      const base = stones[i % stones.length];
      gg.addColorStop(0, '#ffffff');
      gg.addColorStop(.25, base);
      gg.addColorStop(1, base);
      x.fillStyle = gg;
      x.beginPath(); x.ellipse(0, 0, r, ry, 0, 0, Math.PI*2); x.fill();
      x.restore();
    }
    for (let i = 0; i < 18; i++) {
      const bx = Math.random()*1024, by = Math.random()*1024;
      const r = 60+Math.random()*160;
      const gg = x.createRadialGradient(bx, by, 0, bx, by, r);
      const a = .08+Math.random()*.1;
      gg.addColorStop(0, `rgba(255,255,255,${a})`);
      gg.addColorStop(1, 'rgba(255,255,255,0)');
      x.fillStyle = gg;
      x.beginPath(); x.arc(bx, by, r, 0, Math.PI*2); x.fill();
    }
    return c;
  }

  function setBg(source, w, h) {
    bgW = w; bgH = h;
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, texBg);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
    updateCover();
  }

  function setBgFromImage(img) {
    const M = 2048;
    let w = img.naturalWidth, h = img.naturalHeight;
    const s = Math.min(1, M / Math.max(w, h));
    w = Math.round(w * s); h = Math.round(h * s);
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    setBg(c, w, h);
  }

  function setPhoto(file) {
    if (!booted || !file || !file.type.startsWith('image/')) return;
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(img.src); setBgFromImage(img); };
    img.src = URL.createObjectURL(file);
  }

  function updateCover() {
    const sa = innerWidth/innerHeight, ba = bgW/bgH;
    let cx = 1, cy = 1;
    if (ba > sa) cx = sa/ba; else cy = ba/sa;
    gl.uniform2f(U.cover, cx, cy);
  }

  function resize() {
    const DPR = Math.min(window.devicePixelRatio || 1, 1.5);
    canvas.width = Math.round(innerWidth * DPR);
    canvas.height = Math.round(innerHeight * DPR);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(U.res, canvas.width, canvas.height);
    initSim();
    updateCover();
  }

  function loop() {
    if (!running) return;
    const t = (performance.now() - t0) / 1000;
    lastT = t;
    if (Math.random() < 0.006) drop(Math.random(), Math.random(), 2, .35*STRENGTH);
    stepSim();
    uploadSim();
    gl.uniform1f(U.time, t);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
  }

  function boot() {
    try {
      gl = canvas.getContext('webgl', { antialias: false, alpha: false }) || canvas.getContext('experimental-webgl');
      if (!gl) return false;

      prog = gl.createProgram();
      gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
      gl.useProgram(prog);

      quad = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, quad);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      aPos = gl.getAttribLocation(prog, 'aPos');
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      U = {
        bg: gl.getUniformLocation(prog, 'uBg'),
        sim: gl.getUniformLocation(prog, 'uSim'),
        cover: gl.getUniformLocation(prog, 'uCover'),
        time: gl.getUniformLocation(prog, 'uTime'),
        res: gl.getUniformLocation(prog, 'uRes'),
      };
      gl.uniform1i(U.bg, 0);
      gl.uniform1i(U.sim, 1);

      texBg = makeTex(0);
      texSim = makeTex(1);

      let lp = null;
      canvas.addEventListener('pointermove', e => {
        const nx = e.clientX/innerWidth, ny = e.clientY/innerHeight;
        if (lp) {
          const dist = Math.hypot(e.clientX-lp.x, e.clientY-lp.y);
          if (dist > 4) { drop(nx, ny, 2.6, 0.55*STRENGTH); lp = {x:e.clientX,y:e.clientY}; }
        } else {
          lp = {x:e.clientX,y:e.clientY};
        }
      });
      canvas.addEventListener('pointerdown', e => {
        const nx = e.clientX/innerWidth, ny = e.clientY/innerHeight;
        drop(nx, ny, 7, 2.4*STRENGTH);
      });
      canvas.addEventListener('pointerleave', () => { lp = null; });
      addEventListener('resize', () => { clearTimeout(rsTimer); rsTimer = setTimeout(() => { if (running) resize(); }, 150); });
      addEventListener('dragover', e => e.preventDefault());
      addEventListener('drop', e => { e.preventDefault(); setPhoto(e.dataTransfer.files[0]); });

      setBg(pastelBackground(), 1024, 1024);
      if (DEFAULT_PHOTO) {
        const img = new Image();
        img.onload = () => setBg(img, img.naturalWidth, img.naturalHeight);
        img.src = DEFAULT_PHOTO;
      }
      t0 = performance.now();
      return true;
    } catch (e) {
      console.error('波紋アニメーションの初期化に失敗しました', e);
      return false;
    }
  }

  function start() {
    if (!booted) booted = boot();
    if (!booted) return;
    canvas.style.display = 'block';
    resize();
    if (!running) {
      running = true;
      requestAnimationFrame(loop);
    }
  }

  window.DreamWater = { start, setPhoto };
})();
</script>
</body>
</html>
