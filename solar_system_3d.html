<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽系 3D | Solar System in Three Dimensions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Red+Hat+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:  #f2c14e;
  --text:  #d5deee;
  --muted: #8792ad;
  --line:  rgba(46,58,99,0.55);
  --glass: rgba(9,12,24,0.62);

  --serif: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
  --jp:    'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif;
  --mono:  'Red Hat Mono', 'Consolas', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body {
  font-family: var(--jp);
  background: #05070d;
  color: var(--text);
  overflow: hidden;
}

#space { position: fixed; inset: 0; display: block; }

/* ── overlay UI ── */
.hud { position: fixed; z-index: 10; }

.hud-title { top: 20px; left: 24px; pointer-events: none; }
.hud-eyebrow {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.32em;
  color: var(--gold);
  text-transform: uppercase;
}
.hud-title h1 {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 16px rgba(0,0,0,0.8);
}
.hud-sub { font-size: 0.75rem; color: var(--muted); }
.hud-note { font-size: 0.68rem; color: rgba(135,146,173,0.75); margin-top: 2px; }

.hud-clock { top: 22px; right: 24px; text-align: right; pointer-events: none; }
.sim-date {
  font-family: var(--mono);
  font-size: 1.15rem;
  font-weight: 600;
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}
.sim-date .tz { font-size: 0.7rem; color: var(--muted); margin-left: 4px; }
.speed-note { font-size: 0.7rem; color: var(--muted); }
.sun-zodiac {
  margin-top: 4px;
  font-size: 0.78rem;
  color: var(--text);
}
.sun-zodiac strong { color: var(--gold); font-weight: 700; }

/* ── bottom bar ── */
.hud-bottom {
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: min(96vw, 980px);
}

.chip-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.chip {
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  font-family: var(--jp);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.45rem 1rem;
  min-height: 40px;
  cursor: pointer;
}
.chip:hover { color: var(--text); border-color: var(--gold); }
.chip.active { color: #100c02; background: var(--gold); border-color: var(--gold); font-weight: 700; }

.ctl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 8px 12px;
}
.ctl-row button {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--jp);
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.4rem 0.8rem;
  min-height: 38px;
  cursor: pointer;
}
.ctl-row button:hover { color: var(--text); }
.ctl-row button.active { color: #100c02; background: var(--gold); font-weight: 700; }
.ctl-sep { width: 1px; height: 22px; background: var(--line); }
#btn-play { font-size: 0.9rem; min-width: 58px; }
.date-jump {
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 0.35rem 0.5rem;
  min-height: 38px;
  outline: none;
  color-scheme: dark;
}
.date-jump:focus { border-color: var(--gold); }

/* ── info card ── */
.info-card {
  top: 50%;
  right: 24px;
  transform: translateY(-50%) translateX(24px);
  width: 290px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 1.3rem 1.4rem 1.2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s, transform 0.45s;
}
.info-card.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
@media (prefers-reduced-motion: reduce) { .info-card { transition: none; } }

.info-close {
  position: absolute;
  top: 10px; right: 10px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
}
.info-close:hover { color: var(--gold); border-color: var(--gold); }

.info-name {
  font-family: var(--serif);
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--gold);
}
.info-en {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 0.7rem;
}
.info-desc {
  font-family: var(--serif);
  font-size: 0.9rem;
  line-height: 1.9;
  color: var(--text);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 0.7rem 0;
  margin-bottom: 0.7rem;
}
.info-data { display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; font-size: 0.78rem; }
.info-data dt { color: var(--muted); }
.info-data dd { font-family: var(--mono); text-align: right; }

/* ── 星座学習パネル ── */
.const-panel {
  top: 138px;
  left: 24px;
  width: 216px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
}
.const-head {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--gold);
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 0.7rem 1rem;
  cursor: pointer;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.const-head .arrow { font-size: 0.7rem; color: var(--muted); }
.const-body {
  max-height: min(48vh, 420px);
  overflow-y: auto;
  padding: 0 0.6rem 0.7rem;
}
.const-body::-webkit-scrollbar { width: 6px; }
.const-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.const-panel.collapsed .const-body { display: none; }
.const-group {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  padding: 0.6rem 0.4rem 0.3rem;
  border-bottom: 1px solid var(--line);
  margin-bottom: 3px;
}
.const-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: none;
  border-radius: 6px;
  color: var(--text);
  font-family: var(--jp);
  font-size: 0.83rem;
  padding: 0.34rem 0.5rem;
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
}
.const-item .const-jp { font-size: 0.7rem; color: var(--muted); }
.const-item:hover { background: rgba(242,193,78,0.12); color: var(--gold); }
.const-item:hover .const-jp { color: var(--gold); }
.const-item.active { background: var(--gold); color: #100c02; font-weight: 700; }
.const-item.active .const-jp { color: rgba(16,12,2,0.75); }

.hint {
  left: 24px;
  bottom: 18px;
  font-size: 0.72rem;
  color: var(--muted);
  pointer-events: none;
  line-height: 1.7;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}

.boot-error {
  position: fixed; inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  z-index: 50;
  background: rgba(5,7,13,0.9);
  font-size: 0.95rem;
  line-height: 2;
}

button:focus-visible, input:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

@media (max-width: 700px) {
  .hud-title h1 { font-size: 1.25rem; }
  .hud-clock { top: auto; bottom: 150px; right: 12px; }
  .info-card { right: 12px; width: min(86vw, 290px); }
  .hint { display: none; }
  .const-panel { top: 96px; left: 12px; width: 176px; }
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<div class="hud hud-title">
  <div class="hud-eyebrow">Solar System — Three Dimensions</div>
  <h1>太陽系 3D</h1>
  <div class="hud-sub">ドラッグで回転 ／ ホイールでズーム ／ 惑星をクリックで接近</div>
  <div class="hud-note">軌道・位置は計算値（1800–2050年）。距離は圧縮・大きさは誇張表示</div>
</div>

<div class="hud hud-clock">
  <div class="sim-date"><span id="sim-date">—</span><span class="tz">JST</span></div>
  <div class="speed-note" id="speed-note"></div>
  <div class="sun-zodiac">太陽の方向: <strong id="sun-zodiac">—</strong></div>
</div>

<div class="hud const-panel" id="const-panel">
  <button class="const-head" id="const-head" type="button">星座を学ぶ <span class="arrow">▾</span></button>
  <div class="const-body" id="const-body"></div>
</div>

<div class="hud hud-bottom">
  <div class="chip-row" id="chip-row">
    <button class="chip active" data-focus="-1" type="button">⊙ 全体</button>
    <button class="chip" data-focus="0" type="button">Mercury</button>
    <button class="chip" data-focus="1" type="button">Venus</button>
    <button class="chip" data-focus="2" type="button">Earth</button>
    <button class="chip" data-focus="3" type="button">Mars</button>
    <button class="chip" data-focus="4" type="button">Jupiter</button>
    <button class="chip" data-focus="5" type="button">Saturn</button>
    <button class="chip" data-focus="6" type="button">Uranus</button>
    <button class="chip" data-focus="7" type="button">Neptune</button>
  </div>
  <div class="ctl-row">
    <button id="btn-play" type="button">⏸ 停止</button>
    <span class="ctl-sep"></span>
    <button data-speed="1" type="button">1日/秒</button>
    <button data-speed="10" type="button" class="active">10日/秒</button>
    <button data-speed="100" type="button">100日/秒</button>
    <button data-speed="365" type="button">1年/秒</button>
    <span class="ctl-sep"></span>
    <input class="date-jump" id="date-jump" type="date" min="1800-01-01" max="2050-12-31" aria-label="日付へジャンプ">
    <button id="btn-today" type="button">今日</button>
    <span class="ctl-sep"></span>
    <button id="btn-const" type="button" class="active">星座 表示中</button>
  </div>
</div>

<aside class="hud info-card" id="info-card" aria-live="polite">
  <button class="info-close" id="info-close" type="button" aria-label="閉じる">✕</button>
  <div class="info-name" id="info-name">—</div>
  <div class="info-en" id="info-en">—</div>
  <div class="info-desc" id="info-desc">—</div>
  <dl class="info-data">
    <dt>太陽からの平均距離</dt><dd id="d-a">—</dd>
    <dt>現在の太陽距離</dt><dd id="d-now">—</dd>
    <dt>公転周期</dt><dd id="d-orbit">—</dd>
    <dt>自転周期</dt><dd id="d-spin">—</dd>
    <dt>赤道半径</dt><dd id="d-radius">—</dd>
    <dt>軸の傾き</dt><dd id="d-tilt">—</dd>
  </dl>
</aside>

<aside class="hud info-card" id="const-card" aria-live="polite">
  <button class="info-close" id="const-close" type="button" aria-label="閉じる">✕</button>
  <div class="info-name" id="c-name">—</div>
  <div class="info-en" id="c-en">—</div>
  <div class="info-desc" id="c-desc">—</div>
  <dl class="info-data" id="c-data"></dl>
</aside>

<div class="hud hint">©bombaycat0428</div>

<div class="boot-error" id="boot-error">
  3D ライブラリ（three.js）の読み込みに失敗しました。<br>
  インターネット接続を確認して、ページを再読み込みしてください。
</div>

<script>
  window.__orrery3dBooted = false;
  setTimeout(() => {
    if (!window.__orrery3dBooted) document.getElementById('boot-error').style.display = 'flex';
  }, 6000);
</script>

function keplerE(M, e) {
  let E = M + e * Math.sin(M);
  for (let i = 0; i < 8; i++) E = E - (E - e*Math.sin(E) - M) / (1 - e*Math.cos(E));
  return E;
}
function orbitalFrame(p, T) {
  const om = ((p.w[0]+p.w[1]*T) - (p.O[0]+p.O[1]*T)) * D2R;
  const O  = (p.O[0]+p.O[1]*T) * D2R;
  const I  = (p.I[0]+p.I[1]*T) * D2R;
  const cw=Math.cos(om), sw=Math.sin(om), cO=Math.cos(O), sO=Math.sin(O), ci=Math.cos(I), si=Math.sin(I);
  return {
    xx: cw*cO - sw*sO*ci, xy: -sw*cO - cw*sO*ci,
    yx: cw*sO + sw*cO*ci, yy: -sw*sO + cw*cO*ci,
    zx: sw*si,            zy: cw*si
  };
}
/* 日心黄道座標（AU, x/y/z） */
function planetPosAU(p, jd) {
  const T = (jd - 2451545.0) / 36525;
  const a = p.a[0]+p.a[1]*T, e = p.e[0]+p.e[1]*T;
  const M = ((p.L[0]+p.L[1]*T) - (p.w[0]+p.w[1]*T)) * D2R;
  const E = keplerE(M % (2*Math.PI), e);
  const xp = a*(Math.cos(E)-e), yp = a*Math.sqrt(1-e*e)*Math.sin(E);
  const f = orbitalFrame(p, T);
  return { x: f.xx*xp+f.xy*yp, y: f.yx*xp+f.yy*yp, z: f.zx*xp+f.zy*yp };
}
/* 距離を圧縮してシーン座標へ（黄道面 → three.js の x-z 平面） */
const DIST_K = 60, DIST_P = 0.55;
function toScene(pos) {
  const r = Math.hypot(pos.x, pos.y, pos.z) || 1e-9;
  const f = DIST_K * Math.pow(r, DIST_P) / r;
  return new THREE.Vector3(pos.x*f, pos.z*f, -pos.y*f);
}
function moonLongitude(jd) {
  const d = jd - 2451545.0;
  return (218.316 + 13.176396*d + 6.289*Math.sin((134.963+13.064993*d)*D2R)) * D2R;
}
function nowJD() { return Date.now()/86400000 + 2440587.5; }

/* ══════════ プロシージャル・テクスチャ ══════════ */
function hash3(x, y, z) {
  const s = Math.sin(x*127.1 + y*311.7 + z*74.7) * 43758.5453;
  return s - Math.floor(s);
}
function vnoise3(x, y, z) {
  const xi=Math.floor(x), yi=Math.floor(y), zi=Math.floor(z);
  const xf=x-xi, yf=y-yi, zf=z-zi;
  const sx=xf*xf*(3-2*xf), sy=yf*yf*(3-2*yf), sz=zf*zf*(3-2*zf);
  let v = 0;
  for (let dz=0; dz<=1; dz++) for (let dy=0; dy<=1; dy++) for (let dx=0; dx<=1; dx++) {
    const w = (dx?sx:1-sx)*(dy?sy:1-sy)*(dz?sz:1-sz);
    v += w * hash3(xi+dx, yi+dy, zi+dz);
  }
  return v;
}
function fbm3(x, y, z, oct = 4) {
  let v=0, amp=0.5, f=1;
  for (let i=0; i<oct; i++) { v += amp*vnoise3(x*f, y*f, z*f); amp*=0.5; f*=2; }
  return v;
}
/* 球面に貼っても継ぎ目が出ないよう、経度を円周上の座標に変換してノイズを引く */
function sphNoise(u, v, scale, oct, seed) {
  const a = u * 2 * Math.PI;
  return fbm3(Math.cos(a)*scale + seed*17.3, v*scale*2 + seed*5.1, Math.sin(a)*scale, oct);
}

function makeTexture(w, h, painter) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');
  const img = g.createImageData(w, h);
  painter(img.data, w, h);
  g.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return { tex, canvas: c };
}
function px(data, i, r, g, b, a = 255) { data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=a; }
const lerp = (a,b,t) => a + (b-a)*t;
const clamp01 = t => Math.max(0, Math.min(1, t));

/* 帯状（ガス惑星）テクスチャ */
function paintBanded(data, w, h, seed, palette, turb, spot) {
  for (let y=0; y<h; y++) {
    const v = y/h;
    for (let x=0; x<w; x++) {
      const u = x/w;
      const dist = (sphNoise(u, v, 3, 4, seed) - 0.5) * turb;
      let lat = v + dist;
      const band = 0.5 + 0.5*Math.sin(lat*Math.PI*2*palette.freq + palette.phase + 2.2*Math.sin(lat*7+seed));
      const n = sphNoise(u, v, 8, 3, seed+3);
      let r = lerp(palette.c1[0], palette.c2[0], band) + (n-0.5)*22;
      let g = lerp(palette.c1[1], palette.c2[1], band) + (n-0.5)*22;
      let b = lerp(palette.c1[2], palette.c2[2], band) + (n-0.5)*22;
      if (spot) {
        const du = (u - spot.u + 1.5) % 1 - 0.5;
        const dv = v - spot.v;
        const d = Math.hypot(du/spot.ru, dv/spot.rv);
        if (d < 1) {
          const m = Math.pow(1-d, 1.4);
          r = lerp(r, spot.col[0], m); g = lerp(g, spot.col[1], m); b = lerp(b, spot.col[2], m);
        }
      }
      px(data, (y*w+x)*4, r, g, b);
    }
  }
}
/* 岩石惑星テクスチャ */
function paintRocky(data, w, h, seed, base, dark, caps, craters) {
  for (let y=0; y<h; y++) {
    const v = y/h;
    for (let x=0; x<w; x++) {
      const u = x/w;
      const n = sphNoise(u, v, 5, 5, seed);
      const m = sphNoise(u, v, 13, 3, seed+9);
      let r = lerp(dark[0], base[0], n) + (m-0.5)*30;
      let g = lerp(dark[1], base[1], n) + (m-0.5)*30;
      let b = lerp(dark[2], base[2], n) + (m-0.5)*30;
      if (caps) {
        const pole = Math.abs(v-0.5)*2;
        const capEdge = 0.86 + 0.06*sphNoise(u, v, 6, 2, seed+4);
        if (pole > capEdge) { const t = clamp01((pole-capEdge)/0.06); r=lerp(r,242,t); g=lerp(g,240,t); b=lerp(b,235,t); }
      }
      px(data, (y*w+x)*4, r, g, b);
    }
  }
  if (craters) {
    let s = seed*7919 + 13;
    const rnd = () => { s = (s*1664525 + 1013904223) >>> 0; return s/4294967296; };
    for (let i=0; i<craters; i++) {
      const cx = rnd()*w, cy = h*0.08 + rnd()*h*0.84, cr = 2 + rnd()*rnd()*14;
      for (let dy=-cr; dy<=cr; dy++) for (let dx=-cr; dx<=cr; dx++) {
        const X = Math.round((cx+dx+w)%w), Y = Math.round(cy+dy);
        if (Y<0 || Y>=h) continue;
        const d = Math.hypot(dx,dy)/cr;
        if (d > 1) continue;
        const i4 = (Y*w+X)*4;
        const shade = d < 0.75 ? -20*(1-d) : 16*(1-Math.abs(d-0.85)/0.15);
        data[i4]   = clamp01((data[i4]+shade)/255)*255;
        data[i4+1] = clamp01((data[i4+1]+shade)/255)*255;
        data[i4+2] = clamp01((data[i4+2]+shade)/255)*255;
      }
    }
  }
}
/* 地球テクスチャ */
function paintEarth(data, w, h) {
  for (let y=0; y<h; y++) {
    const v = y/h;
    const pole = Math.abs(v-0.5)*2;
    for (let x=0; x<w; x++) {
      const u = x/w;
      const n = sphNoise(u, v, 2.6, 5, 42);
      const detail = sphNoise(u, v, 9, 4, 77);
      let r, g, b;
      if (n > 0.53) { // 陸地
        const t = clamp01((n-0.53)/0.2);
        const latGreen = clamp01(1.4 - pole*1.7);
        r = lerp(150, 92, latGreen) + (detail-0.5)*44 + t*22;
        g = lerp(132, 122, latGreen) + (detail-0.5)*40 + t*10;
        b = lerp(96, 66, latGreen) + (detail-0.5)*30;
      } else { // 海
        const depth = clamp01((0.53-n)/0.3);
        r = lerp(38, 12, depth) + (detail-0.5)*8;
        g = lerp(84, 42, depth) + (detail-0.5)*10;
        b = lerp(148, 96, depth) + (detail-0.5)*12;
      }
      const capEdge = 0.88 + 0.05*sphNoise(u, v, 7, 2, 5);
      if (pole > capEdge) { const t = clamp01((pole-capEdge)/0.05); r=lerp(r,240,t); g=lerp(g,246,t); b=lerp(b,250,t); }
      px(data, (y*w+x)*4, r, g, b);
    }
  }
}
/* 雲のアルファマップ */
function paintClouds(data, w, h) {
  for (let y=0; y<h; y++) {
    const v = y/h;
    for (let x=0; x<w; x++) {
      const u = x/w;
      const n = sphNoise(u*1.0, v*2.4, 3.2, 5, 300) * 0.75 + sphNoise(u, v, 10, 3, 301)*0.25;
      const a = clamp01((n-0.52)/0.22) * 235;
      px(data, (y*w+x)*4, 255, 255, 255, a);
    }
  }
}
/* 太陽 */
function paintSun(data, w, h) {
  for (let y=0; y<h; y++) {
    const v = y/h;
    for (let x=0; x<w; x++) {
      const u = x/w;
      const n = sphNoise(u, v, 9, 4, 900);
      const r = 250, g = lerp(170, 215, n), b = lerp(70, 120, n);
      px(data, (y*w+x)*4, r, g, b);
    }
  }
}

function makeRingTexture() {
  const w = 1024, hh = 8;
  const c = document.createElement('canvas');
  c.width = w; c.height = hh;
  const g = c.getContext('2d');
  const img = g.createImageData(w, hh);
  for (let x=0; x<w; x++) {
    const t = x/w;
    let a = 0.75 + 0.25*Math.sin(t*90) * Math.sin(t*33+1);
    if (t < 0.10) a *= t/0.10*0.5;                       // 内側は薄く
    if (t > 0.55 && t < 0.62) a *= 0.12;                 // カッシーニの間隙
    if (t > 0.97) a *= (1-t)/0.03;
    const n = 0.85 + 0.15*Math.sin(t*230+3)*Math.sin(t*57);
    const r = 226*n, gg = 208*n, b = 178*n;
    for (let y=0; y<hh; y++) px(img.data, (y*w+x)*4, r, gg, b, clamp01(a)*255);
  }
  g.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function buildStars() {
  const rnd = (() => { let s=987654321; return () => { s=(s*1664525+1013904223)>>>0; return s/4294967296; }; })();
  const mkPoints = (count, size, opacity) => {
    const pos = new Float32Array(count*3);
    for (let i=0; i<count; i++) {

      const phi = Math.acos(2*rnd()-1);
      const r = 2600 + rnd()*900;
      pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
      pos[i*3+1] = r*Math.cos(phi);
      pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: 0xdde6ff, size, sizeAttenuation: false, transparent: true, opacity, depthWrite: false });

}

function buildOrbitLine(p, jd) {
  const T = (jd - 2451545.0) / 36525;
  const a = p.a[0]+p.a[1]*T, e = p.e[0]+p.e[1]*T;
  const f = orbitalFrame(p, T);
  const pts = [];
  for (let i=0; i<=256; i++) {
    const E = i/256*2*Math.PI;
    const xp = a*(Math.cos(E)-e), yp = a*Math.sqrt(1-e*e)*Math.sin(E);
    pts.push(toScene({ x: f.xx*xp+f.xy*yp, y: f.yx*xp+f.yy*yp, z: f.zx*xp+f.zy*yp }));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x8ca0d2, transparent: true, opacity: 0.22 }));
}

/* 太陽の通り道（実際のIAU星座境界のおよその黄経範囲） */
const ZODIAC_RANGES = [
  { from:352, to:29,  name:'Pisces' },     { from:29,  to:53,  name:'Aries' },
  { from:53,  to:90,  name:'Taurus' },     { from:90,  to:118, name:'Gemini' },
  { from:118, to:138, name:'Cancer' },     { from:138, to:174, name:'Leo' },
  { from:174, to:218, name:'Virgo' },      { from:218, to:241, name:'Libra' },
  { from:241, to:248, name:'Scorpius' },   { from:248, to:266, name:'Ophiuchus' },
  { from:266, to:300, name:'Sagittarius' },{ from:300, to:328, name:'Capricornus' },
  { from:328, to:352, name:'Aquarius' },
];
function sunZodiacName(jd) {
  const e = planetPosAU(PLANETS[2], jd);
  const lon = ((Math.atan2(-e.y, -e.x) / D2R) + 360) % 360;
  for (const z of ZODIAC_RANGES) {
    if (z.from < z.to ? (lon >= z.from && lon < z.to) : (lon >= z.from || lon < z.to)) return z.name;
  }
  return '—';
}

/* 赤道座標 → 黄道座標 → シーン方向（単位ベクトル） */
const OBLIQ = 23.4393 * D2R;
function starDir(raH, decDeg) {
  const a = raH * 15 * D2R, d = decDeg * D2R;
  const xq = Math.cos(d)*Math.cos(a), yq = Math.cos(d)*Math.sin(a), zq = Math.sin(d);
  const ye = yq*Math.cos(OBLIQ) + zq*Math.sin(OBLIQ);
  const ze = -yq*Math.sin(OBLIQ) + zq*Math.cos(OBLIQ);
  return new THREE.Vector3(xq, ze, -ye);
}

const R_SKY = 2800;
const constGroup = new THREE.Group();
const constData = [];   // {dir(中心方向), labelSprite}

function makeConstLabel(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 96;
  const g = c.getContext('2d');
  g.font = '600 40px "Shippori Mincho", serif';
  g.letterSpacing = '8px';
  g.textAlign = 'center';
  g.shadowColor = 'rgba(0,0,0,0.9)';
  g.shadowBlur = 10;
  g.fillStyle = 'rgba(242,193,78,0.85)';
  g.fillText(text, 256, 62);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, opacity: 0.55 }));
  sp.scale.set(190, 36, 1);
  return sp;
}

(function buildConstellations() {
  const tiers = { bright: [], mid: [], faint: [] };
  const linePts = [];
  for (const c of CONSTELLATIONS) {
    const dirs = c.stars.map(s => starDir(s[0], s[1]));
    c.stars.forEach((s, i) => {
      const p = dirs[i].clone().multiplyScalar(R_SKY);
      (s[2] < 1.2 ? tiers.bright : s[2] < 2.8 ? tiers.mid : tiers.faint).push(p.x, p.y, p.z);
    });
    for (const [i, j] of c.lines) {
      const a = dirs[i].clone().multiplyScalar(R_SKY * 0.995);
      const b = dirs[j].clone().multiplyScalar(R_SKY * 0.995);
      linePts.push(a.x, a.y, a.z, b.x, b.y, b.z);
    }
    const center = dirs.reduce((v, d) => v.add(d), new THREE.Vector3()).normalize();
    const label = makeConstLabel(c.en.toUpperCase());
    label.position.copy(center.clone().multiplyScalar(R_SKY * 1.05));
    constGroup.add(label);
    constData.push({ dir: center, label });
  }
  const addPoints = (arr, size, opacity) => {
    if (!arr.length) return;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(arr), 3));
    constGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xf5f7ff, size, sizeAttenuation: false, transparent: true, opacity, depthWrite: false
    })));
  };
  addPoints(tiers.bright, 3.6, 0.65);
  addPoints(tiers.mid, 2.6, 0.5);
  addPoints(tiers.faint, 1.8, 0.35);

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(linePts), 3));
  constGroup.add(new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.22
  })));
  scene.add(constGroup);
})();

/* ══════════ 天の川（実際の銀河面の向きに配置） ══════════ */
(function buildMilkyWay() {
  // 銀河北極 RA12h51.4m/+27.1°、銀河中心 RA17h45.6m/-28.9°（いて座の方向）
  const N = starDir(12.857, 27.13);
  const C = starDir(17.76, -28.94);
  const E = new THREE.Vector3().crossVectors(N, C).normalize();

  // 光の帯：雲のむら・中心バルジ・暗黒帯を持つ空テクスチャ
  const { tex } = makeTexture(1024, 512, (data, w, h) => {
    for (let py = 0; py < h; py++) {
      const th = Math.PI * (py + 0.5) / h;
      const sinT = Math.sin(th), cosT = Math.cos(th);
      for (let qx = 0; qx < w; qx++) {
        const ph = 2 * Math.PI * (qx + 0.5) / w;
        const dx = -Math.cos(ph) * sinT, dy = cosT, dz = Math.sin(ph) * sinT;

        const sb = Math.max(-1, Math.min(1, dx*N.x + dy*N.y + dz*N.z));
        const bDeg = Math.asin(sb) / D2R;                       // 銀河緯度
        const lDeg = Math.atan2(dx*E.x + dy*E.y + dz*E.z,
                                dx*C.x + dy*C.y + dz*C.z) / D2R; // 銀河経度（中心=0）

        const cloud = Math.pow(0.30 + 0.70 * fbm3(dx*3.6 + 8.2, dy*3.6, dz*3.6, 4), 1.6);
        const sig   = 6.5 + 4 * fbm3(dx*1.4, dy*1.4 + 3.7, dz*1.4, 3);
        const core  = Math.exp(-(bDeg*bDeg) / (2*sig*sig));
        const halo  = 0.12 * Math.exp(-(bDeg*bDeg) / (2*16*16));
        const bulge = 0.8 * Math.exp(-(lDeg*lDeg)/(2*26*26) - (bDeg*bDeg)/(2*10*10));
        const laneB = (fbm3(dx*2.1 + 27, dy*2.1, dz*2.1 + 13, 3) - 0.5) * 7;
        const laneS = 0.85 * Math.exp(-(lDeg*lDeg)/(2*75*75));
        const dust  = 1 - laneS * Math.exp(-Math.pow(bDeg - laneB, 2)/(2*3.0*3.0));

        const I = Math.max(0, (core*cloud + halo*(0.3 + 0.7*cloud) + bulge*(0.3 + 0.7*cloud)) * dust - 0.04);
        const warm = Math.exp(-(lDeg*lDeg)/(2*50*50));
        px(data, (py*w + qx)*4,
           lerp(172, 224, warm), lerp(192, 210, warm), lerp(226, 194, warm),
           Math.min(1, I) * 0.2 * 255);
      }
    }
  });
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(3800, 64, 32),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false })
  );
  scene.add(sky);

  // 帯に沿った星つぶ（中心方向は密に）
  const rnd = (() => { let s = 20270802; return () => { s = (s*1664525 + 1013904223) >>> 0; return s/4294967296; }; })();
  const gauss = () => (rnd() + rnd() + rnd() + rnd() - 2) / 2;
  const count = 2600;
  const pos = new Float32Array(count * 3);
  const v = new THREE.Vector3();
  for (let i = 0; i < count; i++) {
    const l = i < 600 ? gauss() * 0.9 : rnd() * Math.PI * 2;
    const b = gauss() * (0.20 + 0.10 * Math.exp(-(l*l)/(2*0.8*0.8)));
    const cb = Math.cos(b);
    v.set(0, 0, 0)
      .addScaledVector(C, cb * Math.cos(l))
      .addScaledVector(E, cb * Math.sin(l))
      .addScaledVector(N, Math.sin(b));
    const r = 2700 + rnd() * 800;
    pos[i*3] = v.x*r; pos[i*3+1] = v.y*r; pos[i*3+2] = v.z*r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xe8eeff, size: 1.1, sizeAttenuation: false, transparent: true, opacity: 0.5, depthWrite: false
  })));
})();

const fmtSim = new Intl.DateTimeFormat('ja-JP', { timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' });

function updateClock() {
  document.getElementById('sim-date').textContent = fmtSim.format(new Date((simJD-2440587.5)*86400000));
  document.getElementById('speed-note').textContent =
    playing ? `再生中 — ${speed >= 365 ? '1年' : speed + '日'}/秒` : '一時停止中';

}
function updatePlayBtn() {
  document.getElementById('btn-play').textContent = playing ? '⏸ 停止' : '▶ 再生';
  updateClock();
}
function syncDateInput() {
  const jst = new Date((simJD-2440587.5)*86400000 + 9*3600000);
  document.getElementById('date-jump').value = jst.toISOString().slice(0,10);
}

function updateLiveDistance() {
  if (focusIdx < 0) return;
  const pos = planetPosAU(PLANETS[focusIdx], simJD);
  document.getElementById('d-now').textContent = Math.hypot(pos.x, pos.y, pos.z).toFixed(2) + ' AU';
}

function closeConstCard() {
  document.getElementById('const-card').classList.remove('open');
  document.querySelectorAll('.const-item').forEach(b => b.classList.remove('active'));
}

function setFocus(idx) {
  focusIdx = idx;
  closeConstCard();
  document.querySelectorAll('#chip-row .chip').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.focus) === idx));
  const card = document.getElementById('info-card');
  if (idx >= 0) {
    const o = planetObjs[idx];
    followPrev.copy(o.group.position);
    const dir = camera.position.clone().sub(o.group.position).normalize();
    if (dir.lengthSq() < 1e-6) dir.set(0, 0.4, 1).normalize();
    transition = { t: 0, fromCam: camera.position.clone(), fromTgt: controls.target.clone(),
                   offset: dir.multiplyScalar(o.p.size*5.2 + 4) };
    controls.autoRotate = false;
    // 情報カード
    document.getElementById('info-name').textContent = o.p.en;
    document.getElementById('info-en').textContent = o.p.name;
    document.getElementById('info-desc').textContent = o.p.desc;
    document.getElementById('d-a').textContent = o.p.aU.toFixed(2) + ' AU';
    document.getElementById('d-orbit').textContent = o.p.orbit;
    document.getElementById('d-spin').textContent = o.p.spin;
    document.getElementById('d-radius').textContent = o.p.radius;
    document.getElementById('d-tilt').textContent = o.p.tiltDeg + '°';
    card.classList.add('open');
    updateLiveDistance();
  } else {
    card.classList.remove('open');
    transition = { t: 0, fromCam: camera.position.clone(), fromTgt: controls.target.clone(),
                   overviewCam: new THREE.Vector3(0, 230, 480) };
  }
}

/* ══════════ 星座学習 UI ══════════ */
function lookAtConstellation(idx) {
  // 惑星フォーカスを解除して俯瞰状態に
  focusIdx = -1;
  document.querySelectorAll('#chip-row .chip').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.focus) === -1));
  document.getElementById('info-card').classList.remove('open');

  const c = CONSTELLATIONS[idx];
  const dir = constData[idx].dir;
  const dist = Math.min(650, Math.max(180, camera.position.length()));
  transition = { t: 0, fromCam: camera.position.clone(), fromTgt: controls.target.clone(),
                 overviewCam: dir.clone().multiplyScalar(-dist) };
  controls.autoRotate = false;

  document.getElementById('c-name').textContent = c.en;
  document.getElementById('c-en').textContent = c.name;
  document.getElementById('c-desc').textContent = c.desc;
  const rows = [['見ごろの季節', c.season], ['目印の星', c.bright]];
  if (c.sunPeriod) rows.push(['太陽が通る時期', c.sunPeriod]);
  document.getElementById('c-data').innerHTML =
    rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
  document.getElementById('const-card').classList.add('open');

  document.querySelectorAll('.const-item').forEach((b, i) => b.classList.toggle('active', i === idx));
  if (!constGroup.visible) toggleConst(true);
}

function toggleConst(show) {
  constGroup.visible = show ?? !constGroup.visible;
  const btn = document.getElementById('btn-const');
  btn.classList.toggle('active', constGroup.visible);
  btn.textContent = constGroup.visible ? '星座 表示中' : '星座 非表示';
  if (!constGroup.visible) closeConstCard();
}

(function buildConstList() {
  const body = document.getElementById('const-body');
  const addGroup = (title, filterZodiac) => {
    const g = document.createElement('div');
    g.className = 'const-group';
    g.textContent = title;
    body.appendChild(g);
    CONSTELLATIONS.forEach((c, i) => {
      if (c.zodiac !== filterZodiac) return;
      const b = document.createElement('button');
      b.className = 'const-item';
      b.type = 'button';
      b.innerHTML = `<span>${c.en}</span><span class="const-jp">${c.name}</span>`;
      b.addEventListener('click', () => lookAtConstellation(i));
      body.appendChild(b);
    });
  };
  addGroup('黄道十二星座', true);
  addGroup('季節の星座', false);
})();

document.getElementById('const-head').addEventListener('click', () => {
  document.getElementById('const-panel').classList.toggle('collapsed');
});
if (window.innerWidth < 700) document.getElementById('const-panel').classList.add('collapsed');

document.getElementById('btn-const').addEventListener('click', () => toggleConst());
document.getElementById('const-close').addEventListener('click', closeConstCard);

/* ══════════ UI イベント ══════════ */
document.getElementById('chip-row').addEventListener('click', ev => {
  const btn = ev.target.closest('.chip');
  if (btn) setFocus(Number(btn.dataset.focus));
});
document.getElementById('info-close').addEventListener('click', () => setFocus(-1));
document.getElementById('btn-play').addEventListener('click', () => { playing = !playing; updatePlayBtn(); });
document.querySelectorAll('.ctl-row button[data-speed]').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = Number(btn.dataset.speed);
    document.querySelectorAll('.ctl-row button[data-speed]').forEach(b => b.classList.toggle('active', b === btn));
    updateClock();
  });
});
document.getElementById('date-jump').addEventListener('change', ev => {
  const ms = Date.parse(ev.target.value + 'T00:00:00+09:00');
  if (!Number.isNaN(ms)) { simJD = ms/86400000 + 2440587.5; updateClock(); }
});
document.getElementById('btn-today').addEventListener('click', () => { simJD = nowJD(); syncDateInput(); updateClock(); });

/* クリックで惑星選択（ドラッグと区別） */
let downX = 0, downY = 0;
renderer.domElement.addEventListener('pointerdown', e => { downX = e.clientX; downY = e.clientY; });
renderer.domElement.addEventListener('pointerup', e => {
  if (Math.hypot(e.clientX-downX, e.clientY-downY) > 6) return;
  const ndc = new THREE.Vector2(
    (e.clientX/window.innerWidth)*2 - 1,
    -(e.clientY/window.innerHeight)*2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const meshes = planetObjs.map(o => o.mesh);
  const hit = ray.intersectObjects(meshes, false)[0];
  if (hit) setFocus(hit.object.userData.planetIndex);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ══════════ メインループ ══════════ */
const clock = new THREE.Clock();
let clockAccum = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (playing) {
    simJD += speed * dt;
    clockAccum += dt;
    if (clockAccum > 0.25) { clockAccum = 0; updateClock(); updateLiveDistance(); }
  }

  // 惑星の位置と自転
  for (const o of planetObjs) {
    o.group.position.copy(toScene(planetPosAU(o.p, simJD)));
    const spinRevPerSec = playing
      ? Math.max(-0.45, Math.min(0.45, speed / o.p.spinDays / 40))
      : (reducedMotion ? 0 : 0.02 * Math.sign(o.p.spinDays));
    o.mesh.rotation.y += spinRevPerSec * 2*Math.PI * dt;
    if (o.clouds) o.clouds.rotation.y += spinRevPerSec * 2*Math.PI * dt * 1.25;
    if (o.moon) {
      const lm = moonLongitude(simJD);
      o.moon.position.set(Math.cos(lm)*5.5, 0, -Math.sin(lm)*5.5);
    }
    // 近づいたらラベルを消す
    const d = camera.position.distanceTo(o.group.position);
    o.label.material.opacity = clamp01((d - o.p.size*7) / 30) * 0.92;
  }

  // カメラ遷移・追従
  if (transition) {
    transition.t += dt / 1.4;
    const t = transition.t >= 1 ? 1 : 1 - Math.pow(1 - transition.t, 3);
    let destTgt, destCam;
    if (focusIdx >= 0) {
      const o = planetObjs[focusIdx];
      destTgt = o.group.position.clone();
      destCam = destTgt.clone().add(transition.offset);
    } else {
      destTgt = new THREE.Vector3(0, 0, 0);
      destCam = transition.overviewCam;
    }
    camera.position.lerpVectors(transition.fromCam, destCam, t);
    controls.target.lerpVectors(transition.fromTgt, destTgt, t);
    if (transition.t >= 1) {
      transition = null;
      if (focusIdx >= 0) followPrev.copy(planetObjs[focusIdx].group.position);
    }
  } else if (focusIdx >= 0) {
    // 惑星の移動分だけカメラも一緒に動かす
    const cur = planetObjs[focusIdx].group.position;
    const delta = cur.clone().sub(followPrev);
    camera.position.add(delta);
    controls.target.copy(cur);
    followPrev.copy(cur);
  }

  controls.update();
  renderer.render(scene, camera);
}

window.__orrery3dBooted = true;
updatePlayBtn();
syncDateInput();
animate();
</script>
