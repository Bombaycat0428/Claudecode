<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日書き込める！天気予報付きカレンダー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background-color: #f4f7f6;
            margin: 0;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        select {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .weekday-header {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            background-color: #eee;
            border-radius: 4px;
        }
        .day-cell {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            min-height: 120px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .day-number {
            font-weight: bold;
            font-size: 14px;
        }
        .holiday-label {
            font-size: 11px;
            color: #ff3b30;
            font-weight: bold;
            margin: 2px 0;
        }
        /* 天気情報の表示スタイル */
        .weather-info {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: #555;
            margin: 2px 0;
            background: #f0f8ff;
            border-radius: 4px;
            padding: 2px;
        }
        .weather-icon {
            width: 24px;
            height: 24px;
        }
        .plan-input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px;
            font-size: 12px;
            margin-top: auto;
        }
        .save-btn {
            font-size: 10px;
            background: #34c759;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 5px;
            cursor: pointer;
            margin-top: 4px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; margin-top: 0;">📅 マイ・天気カレンダー</h1>
    
    <div class="header-controls">
        <select id="yearSelect" onchange="initCalendar()">
            <option value="2025">2025年</option>
            <option value="2026" selected>2026年</option>
            <option value="2027">2027年</option>
        </select>

        <select id="monthSelect" onchange="initCalendar()">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7" selected>7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
        </select>
    </div>

    <div class="calendar-grid" style="margin-bottom: 8px;">
        <div class="weekday-header" style="color: #ff3b30;">日</div>
        <div class="weekday-header">月</div>
        <div class="weekday-header">火</div>
        <div class="weekday-header">水</div>
        <div class="weekday-header">木</div>
        <div class="weekday-header">金</div>
        <div class="weekday-header" style="color: #0071e3;">土</div>
    </div>

    <div id="calendarDays" class="calendar-grid"></div>
</div>

<script>
    // 取得したAPIキーをここに貼り付けてください
    const OPENWEATHER_API_KEY = 'YOUR_API_KEY'; 
    const CITY_NAME = 'Tokyo'; // 天気を取得したい都市名

    let holidayData = [];
    let weatherData = {}; // 日付をキーにした天気情報の格納用

    window.onload = function() {
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth() + 1;

        document.getElementById('yearSelect').value = currentYear;
        document.getElementById('monthSelect').value = currentMonth;

        initCalendar();
    };

    // カレンダーとデータの初期化
    async function initCalendar() {
        const year = document.getElementById('yearSelect').value;
        const month = document.getElementById('monthSelect').value;

        // 1. 祝日データの取得
        try {
            const response = await fetch(`https://date.nager.at/api/v3/publicholidays/${year}/JP`);
            holidayData = await response.json();
        } catch (error) {
            console.error('祝日データの取得失敗:', error);
            holidayData = [];
        }

        // 2. 天気予報データの取得 (APIキーが設定されている場合のみ)
        if (OPENWEATHER_API_KEY !== 'YOUR_API_KEY' && OPENWEATHER_API_KEY !== '') {
            await fetchWeatherData();
        }

        // 3. カレンダー描画
        generateDays(year, month);
    }

    // OpenWeather APIから5日間の天気予報を取得して整理する関数
    async function fetchWeatherData() {
        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${CITY_NAME}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=ja`);
            const data = await response.json();
            
            weatherData = {};
            // 3時間ごとのデータから、各日の昼頃（12:00など）の天気を抽出して1日1つにする
            data.list.forEach(item => {
                const dateText = item.dt_txt.split(' ')[0]; // YYYY-MM-DD 部分
                const timeText = item.dt_txt.split(' ')[1]; // HH:MM:SS 部分

                // 12:00に一番近いデータをその日の代表天気とする
                if (!weatherData[dateText] || timeText.startsWith("12")) {
                    weatherData[dateText] = {
                        temp: Math.round(item.main.temp),
                        icon: item.weather[0].icon,
                        description: item.weather[0].description
                    };
                }
            });
        } catch (error) {
            console.error('天気データの取得失敗:', error);
        }
    }

    function generateDays(year, month) {
        const container = document.getElementById('calendarDays');
        container.innerHTML = '';

        const firstDayIndex = new Date(year, month - 1, 1).getDay();
        const totalDays = new Date(year, month, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell';
            emptyCell.style.backgroundColor = '#f9f9f9';
            container.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayCell = document.createElement('div');
            dayCell.className = 'day-cell';

            const formattedMonth = String(month).padStart(2, '0');
            const formattedDay = String(day).padStart(2, '0');
            const dateStr = `${year}-${formattedMonth}-${formattedDay}`;

            // 祝日データ
            const holiday = holidayData.find(h => h.date === dateStr);
            const holidayText = holiday ? `<div class="holiday-label">${holiday.localName}</div>` : '';

            // 天気データがあるか確認してHTMLを作成
            let weatherText = '';
            if (weatherData[dateStr]) {
                const weather = weatherData[dateStr];
                const iconUrl = `https://openweathermap.org/img/wn/${weather.icon}.png`;
                weatherText = `
                    <div class="weather-info" title="${weather.description}">
                        <img class="weather-icon" src="${iconUrl}" alt="${weather.description}">
                        <span>${weather.temp}℃</span>
                    </div>
                `;
            }

            // 予定データ
            const savedPlan = localStorage.getItem(dateStr) || '';

            dayCell.innerHTML = `
                <div>
                    <span class="day-number">${day}</span>
                    ${holidayText}
                    ${weatherText}
                </div>
                <div>
                    <input type="text" class="plan-input" id="input-${dateStr}" placeholder="予定入力" value="${savedPlan}">
                    <button class="save-btn" onclick="savePlan('${dateStr}')">保存</button>
                </div>
            `;

            container.appendChild(dayCell);
        }
    }

    function savePlan(dateStr) {
        const value = document.getElementById(`input-${dateStr}`).value;
        localStorage.setItem(dateStr, value);
        alert(`${dateStr} の予定を保存しました！`);
    }
</script>

</body>
</html>
