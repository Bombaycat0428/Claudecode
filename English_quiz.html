<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学3年 英単語クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --wood:    #6b4423;
  --board:   #15281c;
  --board-up:#1c3324;
  --line:    rgba(255,255,255,0.35);
  --line-soft: rgba(255,255,255,0.2);
  --white:   #ffffff;
  --yellow:  #ffd84d;
  --pink:    #ff9eb5;
  --blue:    #8ecae6;
  --green:   #8ee06a;
  --purple:  #c08eff;
  --muted:   rgba(255,255,255,0.78);

  --jp: 'BIZ UDPGothic', 'Hiragino Kaku Gothic ProN', sans-serif;
  --en: 'Inter', sans-serif;
  --r: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 112.5%; }

body {
  font-family: var(--jp);
  background: #4a2f18;
  color: var(--white);
  min-height: 100vh;
  padding: 24px 14px;
  line-height: 1.5;
}

.page {
  max-width: 760px;
  margin: 0 auto;
  background-color: var(--board);
  border: 12px solid var(--wood);
  border-radius: 8px;
  padding: 2rem 1.6rem;
}

.back-link {
  display: inline-block;
  color: var(--blue);
  font-family: var(--jp);
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  margin-bottom: 1rem;
  min-height: 44px;
  line-height: 1.5;
}
.back-link:hover { text-decoration: underline; }
.back-link:focus-visible { outline: 3px solid var(--yellow); outline-offset: 2px; }
.result-back-link { display: block; text-align: center; margin-top: 1rem; margin-bottom: 0; }

h1 {
  font-size: 1.9rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.sub {
  font-size: 1rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
}

/* ── start screen ── */
.field { margin-bottom: 1.3rem; }
.field label {
  display: block;
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 0.5rem;
  color: var(--muted);
}
select {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--line);
  border-radius: var(--r);
  color: var(--white);
  padding: 0.8rem 1rem;
  font-size: 1.15rem;
  font-family: var(--jp);
  min-height: 52px;
}
select option { background: #1c3324; color: var(--white); }

.btn {
  display: inline-block;
  background: var(--yellow);
  color: #2a1f06;
  border: none;
  border-radius: var(--r);
  padding: 0.9rem 1.8rem;
  font-size: 1.2rem;
  font-family: var(--jp);
  font-weight: 700;
  cursor: pointer;
  min-height: 54px;
  width: 100%;
}
.btn:hover { background: #ffe27a; }
.btn:active { transform: scale(0.98); }
.btn.secondary { background: var(--board-up); color: var(--white); border: 2px solid var(--line); margin-top: 0.8rem; }
.btn.secondary:hover { background: rgba(255,255,255,0.1); }

/* ── quiz screen ── */
.quiz-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.2rem;
  font-family: var(--en);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--muted);
}
.quiz-top .score { color: var(--green); }

.progress-bar {
  height: 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 5px;
  margin-bottom: 1.6rem;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--yellow);
  width: 0%;
}

.q-word {
  font-family: var(--en);
  font-size: 2.4rem;
  font-weight: 800;
  color: var(--yellow);
  text-align: center;
  padding: 1.4rem 0.5rem;
  background: var(--board-up);
  border: 3px solid var(--line);
  border-radius: var(--r);
  margin-bottom: 1.5rem;
  word-break: break-word;
}

.choices { display: flex; flex-direction: column; gap: 0.9rem; }

.choice {
  background: var(--board-up);
  border: 3px solid var(--line);
  border-radius: var(--r);
  color: var(--white);
  padding: 1rem 1.2rem;
  font-size: 1.2rem;
  font-family: var(--jp);
  text-align: left;
  cursor: pointer;
  min-height: 56px;
}
.choice:hover:not(:disabled) { border-color: var(--blue); background: rgba(142,202,230,0.1); }
.choice.correct { border-color: var(--green); background: rgba(142,224,106,0.25); color: var(--green); font-weight: 700; }
.choice.wrong { border-color: var(--pink); background: rgba(255,158,181,0.2); color: var(--pink); font-weight: 700; }
.choice:disabled { cursor: default; }

.next-wrap { margin-top: 1.3rem; }

/* ── result screen ── */
.result-score {
  font-family: var(--en);
  font-size: 3rem;
  font-weight: 800;
  color: var(--yellow);
  text-align: center;
}
.result-score span { font-size: 1.6rem; color: var(--muted); }
.result-label { text-align: center; color: var(--muted); margin-bottom: 1.6rem; font-size: 1.05rem; }

.review-item {
  background: var(--board-up);
  border: 3px solid rgba(255,158,181,0.5);
  border-radius: var(--r);
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
}
.review-word {
  font-family: var(--en);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--pink);
}
.review-meaning { font-size: 1.05rem; color: var(--muted); margin: 0.3rem 0 0.7rem; }
.review-example-label {
  font-family: var(--jp);
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--blue);
  margin-bottom: 0.2rem;
}
.review-example-en { font-family: var(--en); font-size: 1.1rem; color: var(--white); margin-bottom: 0.2rem; }
.review-example-jp { font-size: 1rem; color: var(--muted); }
.review-empty { text-align: center; color: var(--green); font-size: 1.2rem; font-weight: 700; padding: 1rem 0; }

.review-pop {
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 2px dashed var(--line-soft);
}
.review-pop .review-example-label { color: var(--yellow); }
.review-pop .review-example-en { color: var(--yellow); }
.review-pop .review-example-jp { color: rgba(255,216,77,0.8); }

.review-alt {
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 2px dashed var(--line-soft);
}
.review-alt-label {
  font-family: var(--jp);
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--purple);
  margin-bottom: 0.2rem;
}
.review-alt .review-example-en { color: var(--purple); }
.review-alt .review-example-jp { color: rgba(192,142,255,0.8); }

.hidden { display: none !important; }

@media (max-width: 480px) {
  .q-word { font-size: 1.8rem; }
  .result-score { font-size: 2.2rem; }
}
</style>
</head>
<body>
<div class="page">

  <div id="screen-start">
    <a class="back-link" href="English.html">◀ 英単語シートにもどる</a>
    <h1>中学3年 英単語クイズ</h1>
    <div class="sub">カテゴリを選んでスタート！4つの中から正しい意味を選んでね。</div>
    <div class="field">
      <label for="category-select">カテゴリ</label>
      <select id="category-select">
        <option value="all">すべて（70問）</option>
        <option value="動詞">動詞</option>
        <option value="名詞">名詞</option>
        <option value="形容詞">形容詞</option>
        <option value="副詞・接続詞">副詞・接続詞</option>
        <option value="熟語・表現">熟語・表現</option>
        <option value="不規則動詞">不規則動詞</option>
        <option value="入試頻出フレーズ">入試頻出フレーズ</option>
      </select>
    </div>
    <button class="btn" id="start-btn">スタート</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <div class="quiz-top">
      <span id="quiz-progress">1 / 10</span>
      <span class="score">正解 <span id="quiz-score">0</span></span>
    </div>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="q-word" id="q-word">word</div>
    <div class="choices" id="choices"></div>
    <div class="next-wrap">
      <button class="btn hidden" id="next-btn">次へ</button>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <h1>結果</h1>
    <div class="result-score"><span id="result-correct">0</span> / <span id="result-total">0</span> <span>正解</span></div>
    <div class="result-label">間違えた問題はもう一度確認しよう</div>
    <div id="review-list"></div>
    <button class="btn" id="retry-btn">もう一度</button>
    <button class="btn secondary" id="back-btn">カテゴリ選択にもどる</button>
    <a class="back-link result-back-link" href="English.html">◀ 黒板チートシートにもどる</a>
  </div>

</div>

<script>
const WORDS = [
  { cat: '動詞', word: 'decide', meaning: '決める', en0: 'I decided to study English every day.', jp0: '私は毎日英語を勉強することに決めました。', en: 'Tonight, I decide to chase my dreams.', jp: '今夜、僕は夢を追いかけることを決める。', en2: 'I have already decided my fate; there is no turning back.', jp2: '我が運命はすでに決定された、もう後には引けない。' },
  { cat: '動詞', word: 'develop', meaning: '発展させる、開発する', en0: 'This country is developing quickly.', jp0: 'この国は急速に発展しています。', en: 'Step by step, we develop into stars.', jp: '一歩ずつ、僕らはスターへと成長していく。', en2: 'My powers are developing beyond human comprehension.', jp2: '我が力は人間の理解を超えて進化していく。' },
  { cat: '動詞', word: 'improve', meaning: '改善する、向上させる', en0: 'I want to improve my English skills.', jp0: '私は英語力を向上させたいです。', en: 'Every day I improve, shining brighter than before.', jp: '毎日進化していく、前よりも輝いて。', en2: 'Every battle makes me improve, awakening my true power.', jp2: '戦うたびに我は進化し、真の力に目覚める。' },
  { cat: '動詞', word: 'achieve', meaning: '達成する', en0: 'She achieved her goal.', jp0: '彼女は自分の目標を達成しました。', en: 'We can achieve anything under this sky.', jp: 'この空の下なら、僕らは何でも叶えられる。', en2: 'Only the chosen one can achieve this forbidden power.', jp2: '選ばれし者だけが、この禁断の力を手に入れられる。' },
  { cat: '動詞', word: 'suggest', meaning: '提案する', en0: 'He suggested a new idea.', jp0: '彼は新しいアイデアを提案しました。', en: 'Baby, let me suggest a dance under the moonlight.', jp: 'ベイビー、月の光の下でダンスを提案するよ。', en2: 'The darkness suggests a path only I can see.', jp2: '闇は、我にしか見えぬ道を示す。' },
  { cat: '動詞', word: 'communicate', meaning: '伝え合う、コミュニケーションをとる', en0: 'We communicate with friends online.', jp0: '私たちはオンラインで友達とコミュニケーションをとります。', en: "Let's communicate through the rhythm of the night.", jp: '夜のリズムで気持ちを伝え合おう。', en2: 'I communicate with the shadows that dwell within me.', jp2: '我は、我が内に潜む影と語り合う。' },
  { cat: '動詞', word: 'experience', meaning: '経験する', en0: 'I experienced many things in Japan.', jp0: '私は日本で多くのことを経験しました。', en: 'I want to experience this moment forever.', jp: 'この瞬間をずっと経験していたい。', en2: 'I have experienced a power that mortals cannot imagine.', jp2: '我は人間には想像もできぬ力を経験してきた。' },
  { cat: '動詞', word: 'realize', meaning: '気づく、実現する', en0: 'I realized my mistake.', jp0: '私は自分の間違いに気づきました。', en: 'Suddenly I realize, you were the one all along.', jp: '突然気づいたんだ、ずっと君だったって。', en2: 'At that moment, I realized my true name: the Destroyer.', jp2: 'その瞬間、我は真の名を知った——破壊者と。' },
  { cat: '動詞', word: 'protect', meaning: '守る、保護する', en0: 'We should protect the environment.', jp0: '私たちは環境を守るべきです。', en: 'I will protect this love till the end of time.', jp: 'この愛を、時の終わりまで守り抜く。', en2: 'I will protect this world, even if it costs my soul.', jp2: '我が魂を捧げても、この世界を守り抜く。' },
  { cat: '動詞', word: 'produce', meaning: '生産する、作り出す', en0: 'This factory produces cars.', jp0: 'この工場は車を生産しています。', en: 'We produce magic every time we sing.', jp: '僕らは歌うたびに魔法を生み出す。', en2: 'This forbidden ritual will produce a power beyond gods.', jp2: 'この禁断の儀式は、神を超える力を生み出す。' },
  { cat: '動詞', word: 'discover', meaning: '発見する', en0: 'Scientists discovered a new star.', jp0: '科学者たちは新しい星を発見しました。', en: 'Dance with me and discover a brand new world.', jp: '一緒に踊って、新しい世界を見つけよう。', en2: 'I discovered the seal that binds my true power.', jp2: '我は、我が真の力を封じる印を見つけた。' },
  { cat: '動詞', word: 'encourage', meaning: '励ます、勇気づける', en0: 'My teacher encouraged me to try again.', jp0: '先生は私にもう一度やってみるように励ましてくれました。', en: 'Your smile encourages me to keep on flying.', jp: '君の笑顔が、僕を飛び続けさせてくれる。', en2: 'The voice in my head encourages me to unleash my power.', jp2: '我の中の声が、力を解放せよと囃す。' },

  { cat: '名詞', word: 'environment', meaning: '環境', en0: 'We must take care of the environment.', jp0: '私たちは環境を大切にしなければなりません。', en: 'This city is our environment, our stage tonight.', jp: 'この街が僕らの舞台、今夜のステージ。', en2: 'This world is not my true environment; my home is the abyss.', jp2: 'この世界は我の本来の居場所ではない、我が故郷は深淵だ。' },
  { cat: '名詞', word: 'opportunity', meaning: '機会、チャンス', en0: 'This is a great opportunity for you.', jp0: 'これはあなたにとって素晴らしい機会です。', en: "This is our opportunity, don't let it slip away.", jp: 'これが僕らのチャンス、逃すなよ。', en2: 'This is the opportunity my cursed blood has waited for.', jp2: 'これこそ、我が呪われた血が待ち望んだ機会。' },
  { cat: '名詞', word: 'situation', meaning: '状況、事態', en0: 'The situation is getting better.', jp0: '状況は良くなってきています。', en: 'In this crazy situation, I just wanna dance with you.', jp: 'こんなクレイジーな状況でも、君と踊りたいんだ。', en2: 'In this situation, only my forbidden power can save us.', jp2: 'この状況を救えるのは、我が禁断の力のみ。' },
  { cat: '名詞', word: 'information', meaning: '情報', en0: 'I need more information about the trip.', jp0: '旅行についてもっと情報が必要です。', en: 'Give me information, tell me where you are tonight.', jp: '教えて、今夜どこにいるのか。', en2: 'I possess information that mankind was never meant to know.', jp2: '我は、人類が知ってはならぬ情報を持っている。' },
  { cat: '名詞', word: 'culture', meaning: '文化', en0: "I'm interested in Japanese culture.", jp0: '私は日本の文化に興味があります。', en: 'We come from different culture, but our hearts beat the same.', jp: '違う文化から来たけど、心は同じビート。', en2: 'I come from a culture sealed away by the gods themselves.', jp2: '我は神々自らが封印した文化の出身者。' },
  { cat: '名詞', word: 'society', meaning: '社会', en0: 'Technology has changed our society.', jp0: 'テクノロジーは私たちの社会を変えました。', en: "We're breaking out of society's rules tonight.", jp: '今夜、社会のルールを飛び出していく。', en2: 'This society fears the power that sleeps within me.', jp2: 'この社会は、我に眠る力を恐れている。' },
  { cat: '名詞', word: 'government', meaning: '政府', en0: 'The government made a new law.', jp0: '政府は新しい法律を作りました。', en: 'No government can stop the way I feel for you.', jp: 'どんな政府も、君への気持ちは止められない。', en2: 'No government on this earth can control what I am.', jp2: 'この地のどの政府も、我という存在を制御できぬ。' },
  { cat: '名詞', word: 'population', meaning: '人口', en0: 'The population of this city is growing.', jp0: 'この都市の人口は増えています。', en: 'In a city of a million population, I found just you.', jp: '何百万もの人の中で、見つけたのは君だけ。', en2: 'Among the entire population, only I carry this curse.', jp2: '全人口の中で、この呪いを背負うのは我ひとり。' },
  { cat: '名詞', word: 'technology', meaning: '科学技術', en0: 'New technology helps our daily life.', jp0: '新しい技術は私たちの生活を助けます。', en: "Technology can't replace this feeling in my heart.", jp: 'どんな技術も、この想いには代えられない。', en2: 'Their technology is nothing before my awakened eye.', jp2: '彼らの技術など、我が覚醒した眼の前では無に等しい。' },
  { cat: '名詞', word: 'energy', meaning: 'エネルギー', en0: 'We need clean energy for the future.', jp0: '私たちは未来のためにきれいなエネルギーが必要です。', en: 'Feel the energy, let the music take control.', jp: 'エネルギーを感じて、音楽に身をまかせて。', en2: 'Dark energy flows through my veins like a second heartbeat.', jp2: '闇のエネルギーが、第二の心臓のように我が血管を流れる。' },
  { cat: '名詞', word: 'relationship', meaning: '関係', en0: 'They have a good relationship.', jp0: '彼らは良い関係を持っています。', en: 'Our relationship is the rhythm of my life.', jp: '僕らの関係は、人生のリズムそのもの。', en2: 'My relationship with the darkness goes back to before my birth.', jp2: '我と闇との関係は、生まれる前から始まっていた。' },
  { cat: '名詞', word: 'ability', meaning: '能力', en0: 'She has the ability to speak three languages.', jp0: '彼女は3つの言語を話す能力があります。', en: "I've got the ability to love you endlessly.", jp: '君を限りなく愛する力が、僕にはある。', en2: 'This ability was sealed within me long before I was born.', jp2: 'この力は、我が生まれる遥か前から封じられていた。' },

  { cat: '形容詞', word: 'important', meaning: '重要な', en0: 'Family is important to me.', jp0: '家族は私にとって重要です。', en: "You're the most important star in my sky.", jp: '君は僕の空で一番大切な星。', en2: 'Nothing is more important than the seal upon my arm.', jp2: '我が右腕の封印より重要なものなど何もない。' },
  { cat: '形容詞', word: 'necessary', meaning: '必要な', en0: 'Water is necessary for life.', jp0: '水は生きるために必要です。', en: 'Your love is necessary, like air to breathe.', jp: '君の愛は必要、息をするように。', en2: 'Pain is necessary to awaken my true form.', jp2: '痛みこそ、真の姿に目覚めるために必要なもの。' },
  { cat: '形容詞', word: 'difficult', meaning: '難しい', en0: 'This question is difficult.', jp0: 'この問題は難しいです。', en: 'Loving you was never difficult at all.', jp: '君を愛することは、ちっとも難しくなかった。', en2: 'Controlling this cursed power is the most difficult battle of all.', jp2: 'この呪われし力を制御することこそ、最も困難な戦い。' },
  { cat: '形容詞', word: 'possible', meaning: '可能な', en0: 'It is possible to finish today.', jp0: '今日終わらせることは可能です。', en: "Anything is possible when we're dancing tonight.", jp: '今夜踊っていれば、何でも可能になる。', en2: 'With this eye, anything becomes possible, even destroying fate.', jp2: 'この瞳があれば、運命を壊すことさえ可能になる。' },
  { cat: '形容詞', word: 'various', meaning: '様々な', en0: 'There are various kinds of food.', jp0: '様々な種類の食べ物があります。', en: "We've been through various nights, but this one feels right.", jp: 'いろんな夜を越えてきたけど、今夜は特別な気がする。', en2: 'I have sealed away various powers too dangerous for this world.', jp2: '我はこの世には危険すぎる様々な力を封じてきた。' },
  { cat: '形容詞', word: 'similar', meaning: '似ている', en0: 'Our opinions are similar.', jp0: '私たちの意見は似ています。', en: 'Our hearts are similar, beating to the same song.', jp: '僕らの心は似ている、同じ歌のリズムで。', en2: 'Your eyes are similar to the ones I see in my nightmares.', jp2: 'お前の瞳は、我が悪夢で見るそれと似ている。' },
  { cat: '形容詞', word: 'serious', meaning: '深刻な、まじめな', en0: 'This is a serious problem.', jp0: 'これは深刻な問題です。', en: "Baby, I'm serious, you're the only one I need.", jp: 'ベイビー、本気だよ、必要なのは君だけ。', en2: 'This is no game; my curse is far more serious than you think.', jp2: 'これは遊びではない、我が呪いはお前が思うより遥かに深刻だ。' },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let quizItems = [];
let currentIndex = 0;
let score = 0;
let wrongItems = [];

const screenStart  = document.getElementById('screen-start');
const screenQuiz   = document.getElementById('screen-quiz');
const screenResult = document.getElementById('screen-result');

document.getElementById('start-btn').addEventListener('click', () => {
  const cat = document.getElementById('category-select').value;
  const pool = cat === 'all' ? WORDS : WORDS.filter(w => w.cat === cat);
  quizItems = shuffle(pool);
  currentIndex = 0;
  score = 0;
  wrongItems = [];
  screenStart.classList.add('hidden');
  screenResult.classList.add('hidden');
  screenQuiz.classList.remove('hidden');
  showQuestion();
});

function showQuestion() {
  const item = quizItems[currentIndex];
  document.getElementById('quiz-progress').textContent = `${currentIndex + 1} / ${quizItems.length}`;
  document.getElementById('quiz-score').textContent = score;
  document.getElementById('progress-fill').style.width = `${(currentIndex / quizItems.length) * 100}%`;
  document.getElementById('q-word').textContent = item.word;

  const others = WORDS.filter(w => w.word !== item.word);
  const distractors = shuffle(others).slice(0, 3).map(w => w.meaning);
  const options = shuffle([item.meaning, ...distractors]);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('hidden');

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      const isCorrect = opt === item.meaning;
      [...choicesEl.children].forEach(c => c.disabled = true);
      if (isCorrect) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        wrongItems.push(item);
        [...choicesEl.children].find(c => c.textContent === item.meaning)?.classList.add('correct');
      }
      document.getElementById('quiz-score').textContent = score;
      nextBtn.classList.remove('hidden');
      nextBtn.focus();
    });
    choicesEl.appendChild(btn);
  });
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIndex++;
  if (currentIndex >= quizItems.length) {
    showResult();
  } else {
    showQuestion();
  }
});

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  screenQuiz.classList.add('hidden');
  screenResult.classList.remove('hidden');
  document.getElementById('result-correct').textContent = score;
  document.getElementById('result-total').textContent = quizItems.length;

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  if (wrongItems.length === 0) {
    list.innerHTML = '<div class="review-empty">全問正解！すごい！</div>';
  } else {
    wrongItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `
        <div class="review-word">${item.word}</div>
        <div class="review-meaning">${item.meaning}</div>
        <div class="review-example-label">通常の例文</div>
        <div class="review-example-en">${item.en0}</div>
        <div class="review-example-jp">${item.jp0}</div>
        <div class="review-pop">
          <div class="review-example-label">洋楽バージョン（イメージ・フィクションです）</div>
          <div class="review-example-en">${item.en}</div>
          <div class="review-example-jp">${item.jp}</div>
        </div>
        <div class="review-alt">
          <div class="review-alt-label">中二病バージョン</div>
          <div class="review-example-en">${item.en2}</div>
          <div class="review-example-jp">${item.jp2}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }
}

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('start-btn').click();
});
document.getElementById('back-btn').addEventListener('click', () => {
  screenResult.classList.add('hidden');
  screenStart.classList.remove('hidden');
});
</script>
