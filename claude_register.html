<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ユーザー登録 | Members</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@500;600&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --coral:          #cc785c;
  --coral-active:   #a9583e;
  --coral-disabled: #e6dfd8;
  --ink:            #141413;
  --body:           #3d3d3a;
  --body-strong:    #252523;
  --muted:          #6c6a64;
  --muted-soft:     #8e8b82;
  --hairline:       #e6dfd8;
  --hairline-soft:  #ebe6df;
  --canvas:         #faf9f5;
  --surface-soft:   #f5f0e8;
  --surface-card:   #efe9de;
  --cream-strong:   #e8e0d2;
  --dark:           #181715;
  --dark-elevated:  #252320;
  --dark-soft:      #1f1e1b;
  --on-dark:        #faf9f5;
  --on-dark-soft:   #a09d96;
  --teal:           #5db8a6;
  --amber:          #e8a55a;
  --success:        #5db872;
  --warning:        #d4a017;
  --error:          #c64545;

  --serif: 'Cormorant Garamond', 'Noto Serif JP', 'Times New Roman', serif;
  --sans:  'Inter', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  --mono:  'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--canvas);
  color: var(--body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.55;
  font-size: 16px;
}

/* ── Top nav ── */
.top-nav {
  border-bottom: 1px solid var(--hairline);
  background: var(--canvas);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  min-height: 64px;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.brand svg { display: block; }
.brand-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.3px;
  line-height: 1;
}
.brand-sub { font-size: 12px; color: var(--muted-soft); margin-left: 2px; }
.nav-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.nav-tab {
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.current { background: var(--surface-card); color: var(--ink); }
.nav-tab .jp { font-weight: 400; color: var(--muted-soft); font-size: 12px; margin-left: 5px; }
.nav-tab.current .jp { color: var(--muted); }

/* ── Page ── */
main { flex: 1; width: 100%; }
.container { max-width: 880px; margin: 0 auto; padding: 48px 24px 96px; }

.page-head { margin-bottom: 32px; }
.page-head h1 {
  font-family: var(--serif);
  font-size: 40px;
  font-weight: 500;
  letter-spacing: -0.5px;
  line-height: 1.15;
  color: var(--ink);
}
.page-head .lede { margin-top: 6px; font-size: 14px; color: var(--muted); }

/* ── Status / gate ── */
.admin-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--surface-soft);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 24px;
  font-size: 14px;
}
.admin-bar[hidden] { display: none; }
.admin-bar .name { font-weight: 600; color: var(--ink); }

.gate-panel {
  border: 1px dashed var(--cream-strong);
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 24px;
}
.gate-panel[hidden] { display: none; }
.gate-panel .gate-icon {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 10px;
}
.gate-panel a { color: var(--coral); text-decoration: none; }
.gate-panel a:hover { text-decoration: underline; }

#admin-content[hidden] { display: none; }

/* ── Form card ── */
.reg-panel {
  background: var(--surface-card);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 40px;
}
.reg-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.3px;
  color: var(--ink);
  margin-bottom: 20px;
}

.fields { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 200px; }
.field label { font-size: 13px; font-weight: 500; color: var(--body-strong); }
.field label .req { color: var(--error); margin-left: 3px; }
.field input {
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  padding: 10px 14px;
  min-height: 42px;
  outline: none;
  width: 100%;
}
.field input.mono { font-family: var(--mono); }
.field input::placeholder { color: var(--muted-soft); }
.field input:focus { border-color: var(--coral); box-shadow: 0 0 0 3px rgba(204,120,92,0.15); }

.input-with-toggle { display: flex; gap: 8px; }
.input-with-toggle input { flex: 1; min-width: 0; }
.btn-toggle-pw {
  flex-shrink: 0;
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 0 14px;
  cursor: pointer;
}
.btn-toggle-pw:hover { color: var(--ink); }
.btn-toggle-pw.active { background: var(--cream-strong); color: var(--ink); border-color: var(--cream-strong); }

.field-checkbox { display: flex; align-items: center; gap: 8px; flex: 1 1 200px; padding-top: 28px; }
.field-checkbox input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--coral); cursor: pointer; }
.field-checkbox label { font-size: 14px; color: var(--body); cursor: pointer; }

.reg-footer { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
.btn-add, .btn-save {
  background: var(--coral);
  border: none;
  border-radius: 8px;
  color: #ffffff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 12px 24px;
  min-height: 44px;
  cursor: pointer;
}
.btn-add:hover, .btn-save:hover, .btn-add:active, .btn-save:active { background: var(--coral-active); }

.btn-cancel {
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  color: var(--body);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 12px 18px;
  min-height: 44px;
  cursor: pointer;
}
.btn-cancel:hover { background: var(--surface-soft); color: var(--ink); }

.form-msg { font-size: 13px; min-height: 1.3em; }
.form-msg.err { color: var(--error); }
.form-msg.ok  { color: var(--success); }

.form-note { font-size: 12px; color: var(--muted); margin-top: 14px; }

/* ── Table ── */
.toolbar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.section-tag {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.3px;
  color: var(--ink);
}
.row-count { font-size: 13px; color: var(--muted); }

.ledger {
  border: 1px solid var(--hairline);
  background: var(--canvas);
  border-radius: 12px;
  overflow-x: auto;
  margin-bottom: 24px;
}
table { width: 100%; border-collapse: collapse; min-width: 520px; }
thead th {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid var(--hairline);
  background: var(--surface-soft);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--hairline-soft); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface-soft); }
td { padding: 12px 16px; vertical-align: middle; font-size: 14px; }
.cell-mono { font-family: var(--mono); color: var(--body-strong); }
.cell-sub { font-size: 13px; color: var(--muted); }
.col-actions { text-align: right; white-space: nowrap; width: 130px; }

.badge-admin {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: #ffffff;
  background: var(--coral);
  border-radius: 9999px;
  padding: 2px 10px;
  margin-left: 8px;
  vertical-align: middle;
}

.btn-del, .btn-edit {
  background: transparent;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 5px 10px;
  cursor: pointer;
  font-family: var(--sans);
  margin-right: 2px;
}
.btn-edit { color: var(--coral); }
.btn-edit:hover { background: rgba(204,120,92,0.1); }
.btn-del { color: var(--muted); }
.btn-del:hover { color: var(--error); background: rgba(198,69,69,0.08); }

.empty-state { padding: 48px 24px; text-align: center; color: var(--muted); font-size: 14px; }
.empty-state .empty-icon {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 10px;
}

/* ── Footer ── */
.site-footer { background: var(--dark); color: var(--on-dark-soft); }
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.footer-brand { display: flex; align-items: center; gap: 10px; color: var(--on-dark); }
.footer-brand .brand-name { font-family: var(--serif); font-size: 18px; font-weight: 500; }
.footer-copy { font-size: 13px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20,20,19,0.45);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 16px;
  overflow-y: auto;
  z-index: 100;
}
.modal-overlay[hidden] { display: none; }
.modal {
  width: 100%;
  max-width: 480px;
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 32px;
  box-shadow: 0 1px 3px rgba(20,20,19,0.08);
}
.modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
.modal-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.3px;
  color: var(--ink);
}
.modal-close {
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 9999px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  width: 36px;
  height: 36px;
  cursor: pointer;
}
.modal-close:hover { color: var(--ink); background: var(--surface-soft); }
.modal-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
.modal .field { flex: none; }

button:focus-visible, input:focus-visible, a:focus-visible {
  outline: 2px solid var(--coral);
  outline-offset: 2px;
}

@media (max-width: 640px) {
  .page-head h1 { font-size: 32px; }
  .reg-panel { padding: 24px 20px; }
  .nav-inner { gap: 10px; }
  .nav-tabs { margin-left: 0; }
}
</style>
</head>

<main>
<div class="container">

<header class="page-head">
  <h1>Members</h1>
  <p class="lede">ユーザーの登録・編集を行います（管理者のみ）。</p>
</header>

<div class="admin-bar" id="admin-status-bar" hidden>
  <span>ログイン中：</span>
  <span class="name" id="admin-status-name"></span>
</div>

<div class="gate-panel" id="gate-panel">
  <span class="gate-icon">Locked</span>
  <span id="gate-msg"></span>
</div>

<div id="admin-content" hidden>

<section class="reg-panel">
  <div class="reg-title">新規ユーザーを登録</div>
  <div class="fields">
    <div class="field">
      <label for="mem-name">氏名<span class="req">*</span></label>
      <input id="mem-name" type="text" placeholder="例: 山田 太郎" autocomplete="off">
    </div>
    <div class="field">
      <label for="mem-passcode">パスコード（4桁）<span class="req">*</span></label>
      <div class="input-with-toggle">
        <input id="mem-passcode" class="mono" type="password" inputmode="numeric" maxlength="4" placeholder="****" autocomplete="off">
        <button type="button" class="btn-toggle-pw" id="mem-toggle-pw" aria-label="パスコードを表示">表示</button>
      </div>
    </div>
    <div class="field">
      <label for="mem-passcode2">パスコード確認<span class="req">*</span></label>
      <input id="mem-passcode2" class="mono" type="password" inputmode="numeric" maxlength="4" placeholder="****" autocomplete="off">
    </div>
    <div class="field-checkbox">
      <input id="mem-admin" type="checkbox">
      <label for="mem-admin">管理者権限を付与する</label>
    </div>
  </div>
  <div class="reg-footer">
    <button class="btn-add" id="btn-add" type="button">登録する</button>
    <span class="form-msg" id="form-msg" role="status"></span>
  </div>
  <div class="form-note">社員番号は登録時に自動で採番されます。パスコードはTimecard画面での本人確認に使用する簡易的なものです（暗号化はされません）。</div>
</section>

<div class="toolbar">
  <span class="section-tag">登録済みユーザー</span>
  <span class="row-count" id="row-count"></span>
</div>

<div class="ledger">
  <table id="member-table" hidden>
    <thead>
      <tr>
        <th>社員番号</th>
        <th>氏名</th>
        <th>登録日</th>
        <th class="col-actions">操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty-state">
    <span class="empty-icon">No Members</span>
    まだユーザーが登録されていません。上のフォームから1人目を登録してください。
  </div>
</div>

</div>

</div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 1 L13.7 10.3 L23 12 L13.7 13.7 L12 23 L10.3 13.7 L1 12 L10.3 10.3 Z" fill="#faf9f5"/>
      </svg>
      <span class="brand-name">Attendance</span>
    </div>
    <span class="footer-copy">&copy;bombaycat0428 — 2026</span>
  </div>
</footer>

<div class="modal-overlay" id="edit-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-title">
    <div class="modal-head">
      <div class="modal-title" id="edit-title">ユーザー情報を編集</div>
      <button class="modal-close" id="edit-close" type="button" aria-label="閉じる">×</button>
    </div>
    <div class="field" style="margin-bottom:1rem;">
      <label for="em-name">氏名<span class="req">*</span></label>
      <input id="em-name" type="text" autocomplete="off">
    </div>
    <div class="field" style="margin-bottom:1rem;">
      <label for="em-passcode">パスコード（4桁）<span class="req">*</span></label>
      <div class="input-with-toggle">
        <input id="em-passcode" class="mono" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
        <button type="button" class="btn-toggle-pw" id="em-toggle-pw" aria-label="パスコードを表示">表示</button>
      </div>
    </div>

      <label for="em-passcode2">パスコード確認<span class="req">*</span></label>
      <input id="em-passcode2" class="mono" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
    </div>
    <div class="field-checkbox" style="padding-top:0;margin-bottom:0.6rem;">
      <input id="em-admin" type="checkbox">
      <label for="em-admin">管理者権限を付与する</label>
    </div>
    <div class="modal-footer">
      <button class="btn-save" id="edit-save" type="button">保存</button>
      <button class="btn-cancel" id="edit-cancel" type="button">キャンセル</button>

    </div>

<script>
const USERS_KEY = 'attendance_users_v1';
const SESSION_KEY = 'attendance_session_v1';

function loadUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) ?? []; }
  catch (e) { return []; }
}
function saveUsers(list) {
  try { localStorage.setItem(USERS_KEY, JSON.stringify(list)); } catch (e) {}
}
function genId() {
  return 'usr-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
function toHalfWidthDigits(v) {
  return String(v ?? '')
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .trim();
}
function formatDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
}

let users = loadUsers();

/* ───────── 管理者救済（empId "admin" のユーザーがいれば昇格のみ） ─────────
   管理者アカウントの新規作成（初回セットアップ）は claude_timecard.html 側で行う */
function hasAnyAdmin() {
  return users.some(u => u.isAdmin);
}
function promoteLegacyAdmin() {
  if (hasAnyAdmin()) return;
  const existing = users.find(u => u.empId === 'admin');
  if (existing) {
    existing.isAdmin = true;
    saveUsers(users);
  }
}
promoteLegacyAdmin();

function nextEmpId() {
  let max = 0;
  users.forEach(u => {
    const n = parseInt(u.empId, 10);
    if (!isNaN(n) && n > max) max = n;
  });
  return String(max + 1).padStart(4, '0');
}

/* ───────── ログイン状態（Timecard画面と共有） ───────── */
let currentAdmin = null;
let currentNonAdmin = null;

function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch (e) { return null; }
}
function restoreSession() {
  currentAdmin = null;
  currentNonAdmin = null;
  const session = loadSession();
  if (!session) return;
  const u = users.find(x => x.id === session.id);
  if (!u) return;
  if (u.isAdmin) currentAdmin = u; else currentNonAdmin = u;
}

function updateAdminUI() {
  const loggedIn = !!(currentAdmin || currentNonAdmin);
  document.getElementById('admin-status-bar').hidden = !loggedIn;
  document.getElementById('gate-panel').hidden = !!currentAdmin;
  document.getElementById('admin-content').hidden = !currentAdmin;

  const gateMsg = document.getElementById('gate-msg');
  if (currentNonAdmin) {
    gateMsg.innerHTML = `「${escapeHtml(currentNonAdmin.name)}」としてログイン中ですが、管理者権限がありません。<a href="claude_timecard.html">タイムカード画面</a>で管理者アカウントとしてログインし直してください。`;
  } else {
    gateMsg.innerHTML = `ユーザー登録・編集画面の閲覧には管理者権限が必要です。<a href="claude_timecard.html">タイムカード画面</a>で管理者としてログインしてください。`;
  }

  if (loggedIn) {
    const u = currentAdmin || currentNonAdmin;
    document.getElementById('admin-status-name').textContent = `${u.name}（${u.empId}）`;
  }
}

/* ───────── 一覧表示 ───────── */
function render() {
  const table = document.getElementById('member-table');
  const emptyState = document.getElementById('empty-state');

  if (users.length === 0) {
    table.hidden = true;
    emptyState.hidden = false;
    document.getElementById('row-count').textContent = '';
    return;
  }

  const sorted = users.slice().sort((a, b) => a.empId.localeCompare(b.empId));
  document.getElementById('tbody').innerHTML = sorted.map(u => `
    <tr>
      <td><span class="cell-mono">${escapeHtml(u.empId)}</span></td>
      <td>${escapeHtml(u.name)}${u.isAdmin ? '<span class="badge-admin">管理者</span>' : ''}</td>
      <td><span class="cell-sub">${formatDate(u.createdAt)}</span></td>
      <td class="col-actions">
        <button class="btn-edit" data-id="${escapeHtml(u.id)}" type="button">編集</button>
        <button class="btn-del" data-id="${escapeHtml(u.id)}" type="button">削除</button>
      </td>
    </tr>`).join('');

  table.hidden = false;
  emptyState.hidden = true;
  document.getElementById('row-count').textContent = `全${users.length}件`;

  document.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEdit(btn.dataset.id));
  });
  document.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const u = users.find(x => x.id === id);
      if (!u) return;
      let msg = `${u.name}（社員番号:${u.empId}）を削除しますか？\n過去の勤怠記録は残りますが、一覧画面のユーザー選択には表示されなくなります。`;
      if (u.isAdmin && users.filter(x => x.isAdmin).length === 1) {
        msg += '\n\n※最後の管理者です。削除すると次回アクセス時に初期管理者(社員番号「admin」/パスコード「admin」)が自動的に復活します。';
      }
      if (!confirm(msg)) return;
      users = users.filter(x => x.id !== id);
      saveUsers(users);
      if (currentAdmin && currentAdmin.id === id) {
        currentAdmin = null;
        saveAdminSession(null);
        updateAdminUI();
      }
      render();
    });
  });
}

/* ───────── 新規登録 ───────── */
function setMsg(text, kind) {
  const el = document.getElementById('form-msg');
  el.textContent = text;
  el.className = 'form-msg' + (kind ? ' ' + kind : '');
}

document.getElementById('btn-add').addEventListener('click', () => {
  const name = document.getElementById('mem-name').value.trim();
  const passcode = toHalfWidthDigits(document.getElementById('mem-passcode').value);
  const passcode2 = toHalfWidthDigits(document.getElementById('mem-passcode2').value);
  const isAdmin = document.getElementById('mem-admin').checked;

  if (!name) { setMsg('氏名を入力してください。', 'err'); return; }
  if (!/^\d{4}$/.test(passcode)) { setMsg('パスコードは数字4桁で入力してください。', 'err'); return; }
  if (passcode !== passcode2) { setMsg('パスコードが一致しません。', 'err'); return; }

  const rec = {
    id: genId(),
    empId: nextEmpId(),
    name,
    passcode,
    isAdmin,
    createdAt: new Date().toISOString()
  };
  users.push(rec);
  saveUsers(users);
  render();
  setMsg(`${rec.name} さんを社員番号 ${rec.empId} で登録しました。`, 'ok');

  document.getElementById('mem-name').value = '';
  document.getElementById('mem-passcode').value = '';
  document.getElementById('mem-passcode2').value = '';
  document.getElementById('mem-admin').checked = false;
  document.getElementById('mem-name').focus();
});

document.querySelectorAll('.reg-panel input[type="text"], .reg-panel input[type="password"]').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-add').click();
  });
});

function bindPasscodeToggle(toggleId, ...fieldIds) {
  const toggle = document.getElementById(toggleId);
  toggle.addEventListener('click', () => {
    const fields = fieldIds.map(id => document.getElementById(id));
    const showing = fields[0].type === 'text';
    fields.forEach(f => { f.type = showing ? 'password' : 'text'; });
    toggle.textContent = showing ? '表示' : '非表示';
    toggle.classList.toggle('active', !showing);
  });
}
bindPasscodeToggle('mem-toggle-pw', 'mem-passcode', 'mem-passcode2');
bindPasscodeToggle('em-toggle-pw', 'em-passcode', 'em-passcode2');

/* ───────── 編集モーダル ───────── */
let editingId = null;

function setEditMsg(text, kind) {
  const el = document.getElementById('edit-msg');
  el.textContent = text;
  el.className = 'form-msg' + (kind ? ' ' + kind : '');
}

function openEdit(id) {
  const u = users.find(x => x.id === id);
  if (!u) return;
  editingId = id;
  document.getElementById('em-name').value = u.name;
  document.getElementById('em-passcode').value = u.passcode;
  document.getElementById('em-passcode2').value = u.passcode;
  document.getElementById('em-admin').checked = !!u.isAdmin;
  setEditMsg('');
  document.getElementById('edit-modal').hidden = false;
  document.getElementById('em-name').focus();
}

function closeEdit() {
  document.getElementById('edit-modal').hidden = true;
  editingId = null;
}

document.getElementById('edit-save').addEventListener('click', () => {
  const name = document.getElementById('em-name').value.trim();
  const passcode = toHalfWidthDigits(document.getElementById('em-passcode').value);
  const passcode2 = toHalfWidthDigits(document.getElementById('em-passcode2').value);
  const isAdmin = document.getElementById('em-admin').checked;

  if (!name) { setEditMsg('氏名を入力してください。', 'err'); return; }
  if (!/^\d{4}$/.test(passcode)) { setEditMsg('パスコードは数字4桁で入力してください。', 'err'); return; }
  if (passcode !== passcode2) { setEditMsg('パスコードが一致しません。', 'err'); return; }

  const idx = users.findIndex(x => x.id === editingId);
  if (idx < 0) { closeEdit(); return; }

  if (!isAdmin && users[idx].isAdmin && users.filter(x => x.isAdmin).length === 1) {
    if (!confirm('最後の管理者権限を外そうとしています。外すと次回アクセス時に初期管理者(社員番号「admin」/パスコード「admin」)が自動的に復活します。よろしいですか？')) {
      return;
    }
  }

  users[idx] = { ...users[idx], name, passcode, isAdmin };
  saveUsers(users);
  if (currentAdmin && currentAdmin.id === users[idx].id) currentAdmin = users[idx];
  render();
  closeEdit();
});

document.getElementById('edit-close').addEventListener('click', closeEdit);
document.getElementById('edit-cancel').addEventListener('click', closeEdit);
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target.id === 'edit-modal') closeEdit();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('edit-modal').hidden) closeEdit();
});
document.querySelectorAll('.modal input[type="text"], .modal input[type="password"]').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('edit-save').click();
  });
});

window.addEventListener('storage', e => {
  if (e.key === USERS_KEY) {
    users = loadUsers();
    promoteLegacyAdmin();
    restoreSession();
    updateAdminUI();
    render();
  }
  if (e.key === SESSION_KEY) { restoreSession(); updateAdminUI(); }
});

/* ───────── 初期化 ───────── */
restoreSession();
updateAdminUI();
render();
</script>
</body>
</html>
