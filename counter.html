<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文字数カウンター</title>
<style>
  :root {
    --bg: #000000;
    --card: #000000;
    --border: #2f3336;
    --ink: #e7e9ea;
    --muted: #71767b;
    --blue: #1d9bf0;
    --blue-dim: #1d9bf055;
    --red: #f52634;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", "Noto Sans JP", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }

  .composer {
    position: relative;
    width: 100%;
    max-width: 720px;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    background: var(--card);
  }

  .composer::before {
    content: "";
    position: absolute;
    inset: -120px;
    z-index: -1;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(29,155,240,0.75), rgba(29,155,240,0.35) 45%, rgba(29,155,240,0.12) 70%, transparent 85%);
    filter: blur(50px);
    animation: glow-breathe 14s ease-in-out infinite;
  }

  @keyframes glow-breathe {
    0%, 100% { opacity: 0.25; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  @media (prefers-reduced-motion: reduce) {
    .composer::before { animation: none; }
  }

  .compose-row {
    display: flex;
    gap: 12px;
  }

  .avatar {
    flex: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #33373b;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar svg { width: 24px; height: 24px; fill: var(--muted); }

  .compose-body {
    flex: 1;
    min-width: 0;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    font-size: 20px;
    line-height: 1.5;
    padding: 6px 0;
    border: none;
    resize: none;
    overflow: hidden;
    box-sizing: border-box;
    font-family: inherit;
    background: transparent;
    color: var(--ink);
  }

  textarea::placeholder {
    color: var(--muted);
  }

  textarea:focus-visible {
    outline: none;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 12px;
  }

  .toolbar-icons {
    display: flex;
    gap: 16px;
  }

  .toolbar-icons svg {
    width: 19px;
    height: 19px;
    fill: var(--blue);
    opacity: 0.9;
  }

  .post-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ring-wrap {
    position: relative;
    width: 28px;
    height: 28px;
    flex: none;
  }

  .ring-wrap svg {
    width: 28px;
    height: 28px;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }

  .ring-progress {
    fill: none;
    stroke: var(--blue);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke 0.2s ease;
  }

  .ring-remaining {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }

  .composer.over .ring-progress { stroke: var(--red); }
  .composer.over .ring-remaining { color: var(--red); }

  .post-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 999px;
    background: var(--blue);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }

  .post-btn:disabled {
    background: var(--blue-dim);
    color: #ffffffaa;
    cursor: default;
  }

  .post-btn:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  .overflow-warning {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    display: none;
  }

  .composer.over .overflow-warning {
    display: block;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .stat .value {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
  }

  .stat .label {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="composer" id="composer">
    <div class="compose-row">
      <div class="avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.2c-3.6 0-9 1.8-9 5.4v1.1h18v-1.1c0-3.6-5.4-5.4-9-5.4z"/></svg>
      </div>
      <div class="compose-body">
        <textarea id="text" placeholder="いまどうしてる？"></textarea>

        <div class="toolbar">
          <div class="toolbar-icons" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </div>

          <div class="post-controls">
            <div class="ring-wrap" aria-hidden="true">
              <svg viewBox="0 0 28 28">
                <circle class="ring-track" cx="14" cy="14" r="11"></circle>
                <circle class="ring-progress" id="ringProgress" cx="14" cy="14" r="11" stroke-dasharray="69.1" stroke-dashoffset="0"></circle>
              </svg>
              <div class="ring-remaining" id="ringRemaining"></div>
            </div>
            <button class="post-btn" id="postBtn" disabled>ポストする</button>
          </div>
        </div>

        <p class="overflow-warning" id="overflowWarning">文字数オーバーしています</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="value" id="charCount">0</span>
        <span class="label">文字数</span>
      </div>
      <div class="stat">
        <span class="value" id="wordCount">0</span>
        <span class="label">単語数</span>
      </div>
      <div class="stat">
        <span class="value" id="lineCount">0</span>
        <span class="label">行数</span>
      </div>
    </div>
  </div>

<script>
  const LIMIT = 140;
  const CIRCUMFERENCE = 2 * Math.PI * 11;

  const composer = document.getElementById('composer');
  const textEl = document.getElementById('text');
  const charCountEl = document.getElementById('charCount');
  const wordCountEl = document.getElementById('wordCount');
  const lineCountEl = document.getElementById('lineCount');
  const ringProgress = document.getElementById('ringProgress');
  const ringRemaining = document.getElementById('ringRemaining');
  const postBtn = document.getElementById('postBtn');

  function update() {
    const text = textEl.value;
    const length = text.length;
    const remaining = LIMIT - length;
    const over = remaining < 0;

    charCountEl.textContent = length;

    const words = text.trim().split(/\s+/).filter(w => w.length > 0);
    wordCountEl.textContent = words.length;

    lineCountEl.textContent = length === 0 ? 0 : text.split(/\n/).length;

    composer.classList.toggle('over', over);

    const ratio = Math.min(length / LIMIT, 1);
    ringProgress.setAttribute('stroke-dasharray', `${CIRCUMFERENCE * ratio} ${CIRCUMFERENCE}`);

    ringRemaining.textContent = length === 0 ? '' : (remaining <= 20 ? remaining : '');

    postBtn.disabled = length === 0 || over;
  }

  function autosize() {
    textEl.style.height = 'auto';
    textEl.style.height = `${textEl.scrollHeight}px`;
  }

  textEl.addEventListener('input', () => {
    update();
    autosize();
  });

  postBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(textEl.value);
      const original = postBtn.textContent;
      postBtn.textContent = 'コピーしました';
      setTimeout(() => { postBtn.textContent = original; }, 1500);
    } catch (err) {
      postBtn.textContent = 'コピーに失敗しました';
      setTimeout(() => { postBtn.textContent = 'ポストする'; }, 1500);
    }
  });

  update();
  autosize();
</script>
</body>
</html>
